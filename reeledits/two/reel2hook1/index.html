const RM=typeof matchMedia!=='undefined'&&matchMedia('(prefers-reduced-motion: reduce)').matches;
const C=DARK?{red:'#E23A2F',white:'#161618',offWhite:'#0B0B0C',redTint:'rgba(226,58,47,.16)',dark:'#F5F3EF',gray:'#9A9A9A',black:'#000000',green:'#22C55E',border:'rgba(255,255,255,.10)'}:{red:'#E23A2F',white:'#FFFFFF',offWhite:'#FAFAFA',redTint:'#FBE6E4',dark:'#0A0A0A',gray:'#555555',black:'#000000',green:'#22C55E',border:'rgba(0,0,0,.08)'};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const ease={
  outCubic:t=>(--t)*t*t+1,
  outBack:t=>{const c=1.70158,d=c+1;return 1+d*Math.pow(t-1,3)+c*Math.pow(t-1,2)},
  outQuad:t=>t*(2-t),
  inOutCubic:t=>t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1,
  outExpo:t=>t===1?1:1-Math.pow(2,-10*t),
  inQuad:t=>t*t,
  outElastic:t=>{const c=(2*Math.PI)/3;if(t===0)return 0;if(t===1)return 1;return Math.pow(2,-10*t)*Math.sin((t*10-.75)*c)+1},
};

/* ================================================================
   WEB AUDIO SFX ENGINE
   ================================================================ */
class SfxEngine {
  constructor(){this.ctx=null;this.gains={master:null};this.ambientNodes=[];}
  ensureCtx(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.gains.master=this.ctx.createGain();
    this.gains.master.gain.value=0.6;
    const comp=this.ctx.createDynamicsCompressor();
    comp.threshold.value=-10;comp.ratio.value=4;comp.attack.value=0.003;comp.release.value=0.18;
    this.gains.master.connect(comp);comp.connect(this.ctx.destination);
  }
  startAmbient(duration=31){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    [130.81,196,261.63,329.63].forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();
      o.type='sine';o.frequency.value=freq;o.detune.value=(i-1.5)*6;
      f.type='lowpass';f.frequency.value=800;f.Q.value=0.5;
      g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.03,now+1);
      g.gain.setValueAtTime(0.03,now+duration-2);g.gain.linearRampToValueAtTime(0,now+duration);
      o.connect(f);f.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+duration);
    });
    const buf=c.createBuffer(1,c.sampleRate*duration,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const s=c.createBufferSource(),lp=c.createBiquadFilter(),gn=c.createGain();
    s.buffer=buf;lp.type='lowpass';lp.frequency.value=400;lp.Q.value=0.3;
    gn.gain.setValueAtTime(0,now);gn.gain.linearRampToValueAtTime(0.015,now+1);
    gn.gain.setValueAtTime(0.015,now+duration-2);gn.gain.linearRampToValueAtTime(0,now+duration);
    s.connect(lp);lp.connect(gn);gn.connect(this.gains.master);s.start(now);
  }
  riser(dur=1.5){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const s=c.createBufferSource(),lp=c.createBiquadFilter(),g=c.createGain();
    s.buffer=buf;lp.type='bandpass';
    lp.frequency.setValueAtTime(200,now);lp.frequency.exponentialRampToValueAtTime(4000,now+dur);lp.Q.value=2;
    g.gain.setValueAtTime(0.01,now);g.gain.linearRampToValueAtTime(0.12,now+dur*0.8);g.gain.linearRampToValueAtTime(0,now+dur);
    s.connect(lp);lp.connect(g);g.connect(this.gains.master);s.start(now);
  }
  tick(freq=1100){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.08);
    o.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+0.08);
  }
  pop(){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(200,now+0.1);
    g.gain.setValueAtTime(0.4,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
    o.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+0.15);
  }
  whoosh(pitch='mid'){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const buf=c.createBuffer(1,c.sampleRate*0.3,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.08));
    const s=c.createBufferSource(),f=c.createBiquadFilter(),g=c.createGain();
    s.buffer=buf;f.type='bandpass';
    const freq=pitch==='high'?4000:pitch==='low'?800:2000;
    f.frequency.value=freq;f.Q.value=1.5;
    g.gain.setValueAtTime(0.25,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
    s.connect(f);f.connect(g);g.connect(this.gains.master);s.start(now);
  }
  ding(freq=880){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.4);
    o.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+0.4);
  }
  thump(){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(120,now);o.frequency.exponentialRampToValueAtTime(40,now+0.2);
    g.gain.setValueAtTime(0.5,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
    o.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+0.25);
  }
  slideUp(){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(900,now+0.2);
    g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
    o.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+0.25);
  }
  confirm(){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    [700,900,1100].forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='sine';o.frequency.value=f;
      const t=now+i*0.08;
      g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      o.connect(g);g.connect(this.gains.master);o.start(t);o.stop(t+0.15);
    });
  }
  rewindSound(){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    /* Sweeping oscillator high to low */
    const o=c.createOscillator(),g=c.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(3000,now);
    o.frequency.exponentialRampToValueAtTime(80,now+0.9);
    g.gain.setValueAtTime(0.35,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.9);
    o.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+0.9);
    /* Noise burst for tape texture */
    const buf=c.createBuffer(1,c.sampleRate*0.8,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++){
      d[i]=(Math.random()*2-1)*0.6*Math.exp(-i/(c.sampleRate*0.4));
    }
    const s=c.createBufferSource(),f=c.createBiquadFilter(),gn=c.createGain();
    s.buffer=buf;f.type='highpass';f.frequency.value=2000;f.Q.value=0.5;
    gn.gain.setValueAtTime(0.3,now);gn.gain.exponentialRampToValueAtTime(0.001,now+0.8);
    s.connect(f);f.connect(gn);gn.connect(this.gains.master);s.start(now);
    /* Flutter/warble effect */
    const o2=c.createOscillator(),g2=c.createGain();
    o2.type='square';
    o2.frequency.setValueAtTime(1500,now);
    o2.frequency.exponentialRampToValueAtTime(40,now+0.7);
    g2.gain.setValueAtTime(0.12,now);
    g2.gain.exponentialRampToValueAtTime(0.001,now+0.7);
    o2.connect(g2);g2.connect(this.gains.master);o2.start(now);o2.stop(now+0.7);
  }
}

  vidCheers:    {s:0.4,  e:6.0},   // twoguystalking.mp4 plays 0.4-6s (+1s)
  textHow:      {s:6.0,  e:7.5},   // freeze + "So how exactly did we end up here?" 1.5s

/* ================================================================
   VHS / REWIND OVERLAY (grain, scanlines, glitch)
   ================================================================ */
function VHSOverlay({intensity}){
  if(intensity<=0)return null;
  return(
    <div style={{position:'absolute',inset:0,zIndex:50,pointerEvents:'none'}}>
      {/* Scanlines */}
      <div style={{
        position:'absolute',inset:0,
        background:'repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px)',
        opacity:intensity*0.8,
      }}/>
      {/* Moving scan bar */}
      <div style={{
        position:'absolute',left:0,right:0,height:120,
        background:'linear-gradient(180deg, transparent, rgba(255,255,255,0.08), transparent)',
        animation:'scanline 0.3s linear infinite',
        opacity:intensity,
      }}/>
      {/* Film grain noise */}
      <div style={{
        position:'absolute',inset:0,
        backgroundImage:`url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E")`,
        opacity:intensity*0.5,
        mixBlendMode:'overlay',
      }}/>
      {/* Color channel shift / glitch bars */}
      <div style={{
        position:'absolute',inset:0,opacity:intensity*0.6,
      }}>
        <div style={{position:'absolute',top:'20%',left:0,right:0,height:4,background:'rgba(255,0,0,0.5)',animation:'vhsTracking 0.15s linear infinite'}}/>
        <div style={{position:'absolute',top:'45%',left:0,right:0,height:6,background:'rgba(0,255,255,0.3)',animation:'vhsTracking 0.2s linear infinite',animationDelay:'0.05s'}}/>
        <div style={{position:'absolute',top:'70%',left:0,right:0,height:3,background:'rgba(255,0,255,0.4)',animation:'vhsTracking 0.12s linear infinite',animationDelay:'0.08s'}}/>
        <div style={{position:'absolute',top:'85%',left:0,right:0,height:8,background:'rgba(255,255,255,0.15)',animation:'vhsTracking 0.18s linear infinite',animationDelay:'0.03s'}}/>
      </div>
      {/* VHS tracking distortion horizontal offset bars */}
      <div style={{
        position:'absolute',inset:0,opacity:intensity*0.4,
        overflow:'hidden',
      }}>
        {[15,30,55,72,88].map((top,i)=>(
          <div key={i} style={{
            position:'absolute',top:`${top}%`,left:0,right:0,height:Math.random()*10+2,
            background:`rgba(${Math.random()>0.5?'255,255,255':'0,0,0'},0.2)`,
            transform:`translateX(${(Math.random()-0.5)*40}px)`,
          }}/>
        ))}
      </div>
      {/* Overall VHS color tint */}
      <div style={{
        position:'absolute',inset:0,
        background:'radial-gradient(ellipse at center, transparent 40%, rgba(0,0,80,0.15) 100%)',
        opacity:intensity*0.5,
      }}/>
    </div>
  );
}

/* ================================================================
   SCENE: Video (twoguystalking 0-5s) + text overlays + rewind
   ================================================================ */
function SceneVideoAndRewind({t,videoRef}){
  /* Stay visible until sitting video takes over */
  if(t>T.vidSitting.s+0.1)return null;
  const isFrozen=t>=T.vidCheers.e;
  const inHowPhase=t>=T.textHow.s&&t<T.textHow.e;
  const rewAnimEnd=T.rewind.s+1.0;
  const inRewind=t>=T.rewind.s&&t<rewAnimEnd;
  const isGreyHold=t>=rewAnimEnd&&t<T.rewind.e;
  const rewProgress=inRewind?clamp((t-T.rewind.s)/1.0,0,1):isGreyHold?1:0;

  /* Text: "So how exactly did we end up here?" */
  const howIn=inHowPhase?clamp((t-T.textHow.s)/0.4,0,1):t>=T.textHow.e?1:0;
  const howOut=t>=T.rewind.s?clamp((t-T.rewind.s)/0.3,0,1):0;

  /* During rewind: desaturation, brightness shifts, jitter. Grey hold keeps full grey. */
  const grayscale=rewProgress*100;
  const brightness=1-rewProgress*0.15;
  const glitchX=inRewind&&!RM?(Math.sin(t*80)*6+Math.sin(t*120)*3)*rewProgress:0;
  const glitchY=inRewind&&!RM?(Math.cos(t*60)*4)*rewProgress:0;
  const videoScale=inRewind?1+rewProgress*0.08:isGreyHold?1.08:1;

  return(
    <div style={{position:'absolute',inset:0,zIndex:10,overflow:'hidden'}}>
      {/* Video element - stays visible (no opacity fade, sitting video hard-cuts on top) */}
      <video ref={videoRef} src="twoguystalking.mp4" playsInline muted
        style={{
          position:'absolute',inset:0,width:'110%',height:'100%',objectFit:'cover',
          filter:`grayscale(${grayscale}%) brightness(${brightness}) contrast(${1+rewProgress*0.2})`,
          transform:`scale(${videoScale}) translate(calc(-3% + ${glitchX}px), ${glitchY}px)`,
          transformOrigin:'50% 50%',
        }}
      />

      {/* Freeze overlay (subtle darken) — visible during freeze and grey hold */}
      {isFrozen&&!inRewind&&(
        <div style={{position:'absolute',inset:0,background:isGreyHold?'rgba(0,0,0,0.18)':'rgba(0,0,0,0.12)'}}/>
      )}

      {/* "So how exactly did we end up here?" text - the ONLY text overlay per the outline */}
      {t>=T.textHow.s&&t<T.rewind.e&&(
        <div style={{
          position:'absolute',top:'42%',left:64,right:64,textAlign:'center',
          transform:'translateY(-50%)',
          opacity:howIn*(1-howOut),
        }}>
          <div style={{
            fontWeight:700,fontSize:48,color:'#fff',
            textShadow:'0 4px 30px rgba(0,0,0,.8), 0 2px 8px rgba(0,0,0,.5)',
            fontStyle:'italic',letterSpacing:'-.01em',lineHeight:1.25,
          }}>
            So how exactly did we end up here?
          </div>
        </div>
      )}

      {/* VHS rewind effect overlay */}
      <VHSOverlay intensity={rewProgress}/>

      {/* During rewind: RGB channel split flicker */}
      {inRewind&&(
        <>
          <div style={{
            position:'absolute',inset:0,
            background:'rgba(255,0,0,0.06)',
            transform:`translateX(${Math.sin(t*100)*rewProgress*12}px)`,
            mixBlendMode:'multiply',
          }}/>
          <div style={{
            position:'absolute',inset:0,
            background:'rgba(0,255,255,0.04)',
            transform:`translateX(${-Math.sin(t*100)*rewProgress*8}px)`,
            mixBlendMode:'screen',
          }}/>
          {/* White flash glitch cuts */}
          {rewProgress>0.3&&rewProgress<0.5&&(
            <div style={{position:'absolute',inset:0,background:'rgba(255,255,255,0.3)'}}/>
          )}
          {rewProgress>0.7&&rewProgress<0.8&&(
            <div style={{position:'absolute',inset:0,background:'rgba(255,255,255,0.2)'}}/>
          )}
        </>
      )}

      {/* Vignette during rewind + grey hold */}
      {(inRewind||isGreyHold)&&(
        <div style={{
          position:'absolute',inset:0,
          background:`radial-gradient(circle at 50% 50%, transparent 20%, rgba(0,0,0,${rewProgress*0.5}) 100%)`,
        }}/>
      )}
    </div>
  );
}

/* ================================================================
   SCENE: Sitting video — plays fully, zoom only in last 1.2s
   ================================================================ */
function SceneSitting({t,sittingRef}){
  const visible=t>=T.vidSitting.s&&t<=T.vidSitting.e+0.5;
  const lt=t-T.vidSitting.s;
  const dur=T.vidSitting.e-T.vidSitting.s;
  const zoomStart=dur-1.2;
  const zoomProgress=clamp((lt-zoomStart)/1.2,0,1);
  const zoom=1+ease.inQuad(zoomProgress)*7;
  const exitF=zoomProgress>0.6?clamp((zoomProgress-0.6)/0.4,0,1):0;
  return(
    <div style={{position:'absolute',inset:0,zIndex:20,overflow:'hidden',opacity:visible?1:0,pointerEvents:visible?'auto':'none'}}>
      <video ref={sittingRef} src="sitting.mp4" playsInline muted preload="auto"
        style={{
          position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',
          transform:`scale(${zoom})`,
          transformOrigin:'50% 55%',
        }}
      />
      <div style={{position:'absolute',inset:0,background:`rgba(250,250,250,${exitF})`}}/>
    </div>
  );
}

/* ================================================================
   MAIN APP — orchestrator with tap-to-play
   ================================================================ */
function App(){
  const[started,setStarted]=React.useState(false);
  const[t,setT]=React.useState(0);
  const[done,setDone]=React.useState(false);
  const[zoom,setZoom]=React.useState(1);
  const vidRef=React.useRef(null);
  const sitRef=React.useRef(null);
  const sfxRef=React.useRef(null);
  const firedRef=React.useRef(new Set());

  React.useEffect(()=>{
    const m=()=>setZoom(Math.min(window.innerWidth/1080,window.innerHeight/1920));
    m();window.addEventListener('resize',m);return()=>window.removeEventListener('resize',m);
  },[]);

  /* ---- SFX triggers ---- */
  React.useEffect(()=>{
    if(!started||done)return;
    const sfx=sfxRef.current;if(!sfx)return;
    const fired=firedRef.current;
    const fire=(k,time,fn)=>{if(t>=time&&!fired.has(k)){fired.add(k);fn();}};

    /* Rewind sound */
    fire('rewindSfx',T.rewind.s,()=>sfx.rewindSound());

    /* Sitting video zoom whoosh (fires when zoom starts, 1.2s before end) */
    fire('sittingZoom',T.vidSitting.e-1.2,()=>sfx.whoosh('low'));

    /* Form title */
    fire('formTitleThump',T.formTitle.s,()=>sfx.thump());
    fire('formTitleWhoosh',T.formTitle.s+0.1,()=>sfx.whoosh('high'));

    /* Form fields - each with tick + subtle whoosh */
    fire('formField1',T.formFill.s+0.1,()=>sfx.tick(1100));
    fire('formField1w',T.formFill.s+0.3,()=>sfx.whoosh('high'));
    fire('formField2',T.formFill.s+1.1,()=>sfx.tick(1100));
    fire('formField2w',T.formFill.s+1.3,()=>sfx.whoosh('high'));
    fire('formField3',T.formFill.s+2.1,()=>sfx.tick(1100));
    fire('formField3w',T.formFill.s+2.3,()=>sfx.whoosh('high'));
    fire('formField4',T.formFill.s+3.1,()=>sfx.tick(1100));
    fire('formField4w',T.formFill.s+3.3,()=>sfx.whoosh('high'));
    fire('formRiser',T.formFill.s+3.5,()=>sfx.riser(0.5));
    fire('formBtn',T.formSubmit.s+0.1,()=>sfx.pop());

    /* Cards */
    fire('card1',T.cards.s+0.3,()=>sfx.whoosh());
    fire('card1d',T.cards.s+0.4,()=>sfx.ding(600));
    fire('card2',T.cards.s+0.7,()=>sfx.whoosh());
    fire('card2d',T.cards.s+0.8,()=>sfx.ding(700));
    fire('notSure',T.notSure.s+0.9,()=>sfx.pop());

    /* Chat */
    fire('chat1',T.chat.s+0.3,()=>sfx.ding(900));
    fire('chat1w',T.chat.s+0.35,()=>sfx.whoosh('high'));
    fire('chat2',T.chat.s+1.3,()=>sfx.tick(700));
    fire('chat2w',T.chat.s+1.35,()=>sfx.whoosh('high'));
    fire('chat3',T.chat.s+2.3,()=>sfx.ding(900));
    fire('chat3w',T.chat.s+2.35,()=>sfx.whoosh('high'));
    fire('chatCard',T.chat.s+3.1,()=>sfx.whoosh());
    fire('chatCardDing',T.chat.s+3.2,()=>sfx.ding(800));

    /* Listing */
    fire('listOpen',T.listing.s+0.1,()=>sfx.whoosh('high'));
    fire('listThump',T.listing.s+0.2,()=>sfx.thump());
    fire('tourReq',T.tour.s+0.1,()=>sfx.pop());
    fire('tourConf',T.tour.s+0.7,()=>sfx.confirm());

    /* CTA */
    fire('ctaIn',T.cta.s+0.1,()=>sfx.thump());
    fire('ctaWhoosh',T.cta.s+0.3,()=>sfx.whoosh());
    fire('ctaTag',T.cta.s+0.6,()=>sfx.ding(880));
    fire('ctaBtn',T.cta.s+1.0,()=>sfx.pop());
    fire('ctaDing',T.cta.s+1.5,()=>sfx.ding(1100));
  },[t,started,done]);

  /* ---- Video control: twoguystalking ---- */
  React.useEffect(()=>{
    if(!started)return;
    const v=vidRef.current;
    if(!v)return;
    if(t>=T.vidCheers.s&&t<T.vidCheers.e){
      if(v.paused)try{v.play();}catch{}
      if(v.currentTime>5)v.pause();
    }else{
      if(!v.paused)v.pause();
    }
  },[t,started]);

  /* ---- Video control: sitting (starts at 1.5s mark, caps at 5s) ---- */
  const sitStartedRef=React.useRef(false);
  React.useEffect(()=>{
    if(!started)return;
    const s=sitRef.current;
    if(!s)return;
    if(t>=T.vidSitting.s&&t<T.vidSitting.e){
      if(!sitStartedRef.current){
        s.currentTime=1.5;
        s.muted=false;
        try{s.play();}catch{s.muted=true;try{s.play();}catch{}}
        sitStartedRef.current=true;
      }
      if(s.currentTime>=5){s.pause();s.currentTime=5;}
    }else if(t>=T.vidSitting.e){
      if(!s.paused)s.pause();
    }
  },[t,started]);

  /* ---- Master time loop ---- */
  React.useEffect(()=>{
    if(!started)return;
    let raf;const startNow=performance.now();
    const tick=now=>{
      const elapsed=(now-startNow)/1000;
      setT(elapsed);
      if(elapsed>=TOTAL){setDone(true);return;}
      raf=requestAnimationFrame(tick);
    };
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[started]);

  const begin=async()=>{
    if(!sfxRef.current){sfxRef.current=new SfxEngine();}
    sfxRef.current.ensureCtx();
    try{await sfxRef.current.ctx.resume();}catch{}
    firedRef.current=new Set();
    const v=vidRef.current;
    if(v){v.currentTime=0;v.muted=false;try{await v.play();}catch{v.muted=true;try{await v.play();}catch{}}}
    const s=sitRef.current;
    if(s){s.muted=false;}
    setStarted(true);setDone(false);setT(0);
  };
  const restart=()=>{setStarted(false);setDone(false);setT(0);sitStartedRef.current=false;setTimeout(begin,60);};

  const showChrome=started&&!done&&t>T.formTitle.s&&t<T.cta.s;

  return(
    <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'#000'}}>
      <div style={{width:1080,height:1920,position:'relative',overflow:'hidden',zoom,background:t<T.formTitle.s?'#000':C.offWhite}}>
        <Chrome visible={showChrome} variant="light"/>
        <SceneVideoAndRewind t={t} videoRef={vidRef}/>
        <SceneSitting t={t} sittingRef={sitRef}/>
        <SceneFormTitle t={t}/>
        <SceneForm t={t}/>
        <SceneCards t={t}/>
        <SceneChat t={t}/>
        <SceneListing t={t}/>
        <SceneCTA t={t}/>

        {/* Tap-to-play splash */}
        {!started&&(
          <div onClick={begin} style={{position:'absolute',inset:0,zIndex:500,background:'#0A0A0B',display:'grid',placeItems:'center',cursor:'pointer'}}>
            <div style={{textAlign:'center',color:'#fff'}}>
              <div style={{width:140,height:140,margin:'0 auto 36px',color:C.red}}><Logo size={140} color={C.red}/></div>
              <div style={{fontWeight:900,fontSize:72,letterSpacing:'-.04em'}}>Proximity</div>
              <div style={{marginTop:14,fontWeight:700,fontSize:20,letterSpacing:'.3em',textTransform:'uppercase',color:'rgba(255,255,255,.5)'}}>:37 spot - sound on</div>
              <div style={{marginTop:56,width:120,height:120,borderRadius:'50%',background:C.red,display:'inline-flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
                <div style={{width:0,height:0,borderLeft:'32px solid #fff',borderTop:'20px solid transparent',borderBottom:'20px solid transparent',marginLeft:10}}/>
                <span style={{position:'absolute',inset:0,borderRadius:'50%',background:C.red,animation:'pulse 1.8s ease-out infinite',zIndex:-1}}/>
              </div>
              <div style={{marginTop:24,fontWeight:500,fontSize:24,color:'rgba(255,255,255,.7)'}}>tap to play with sound</div>
            </div>
          </div>
        )}
        {/* Replay button */}
        {done&&(
          <div onClick={restart} style={{position:'absolute',inset:0,zIndex:500,display:'grid',placeItems:'end center',paddingBottom:100,cursor:'pointer'}}>
            <div style={{padding:'20px 48px',background:'rgba(255,255,255,.12)',border:'1.5px solid rgba(255,255,255,.25)',backdropFilter:'blur(12px)',color:'#fff',borderRadius:999,fontWeight:700,fontSize:22,letterSpacing:'.15em',textTransform:'uppercase'}}>&#8635; tap to replay</div>
          </div>
        )}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
