/* ├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р
   CONSTANTS & HELPERS
   ├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р */
const C = {
  red: '#E23A2F', white: '#FFFFFF', offWhite: '#FAFAFA', redTint: '#FBE6E4',
  dark: '#0A0A0A', gray: '#555555', black: '#000000', green: '#22C55E',
};
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
const ease = {
  outCubic: t => (--t) * t * t + 1,
  outBack: t => { const c = 1.70158, d = c + 1; return 1 + d * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); },
  outQuad: t => t * (2 - t),
  outExpo: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
  inOutCubic: t => t < .5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1,
  inQuad: t => t * t,
  outElastic: t => { const c = (2 * Math.PI) / 3; if (t === 0) return 0; if (t === 1) return 1; return Math.pow(2, -10 * t) * Math.sin((t * 10 - .75) * c) + 1; },
};

/* ├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р
   WEB AUDIO SFX ENGINE
   ├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р */
class SfxEngine {
  constructor() { this.ctx = null; this.gains = { master: null }; }
  ensureCtx() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.gains.master = this.ctx.createGain();
    this.gains.master.gain.value = 0.7;
    this.gains.master.connect(this.ctx.destination);
  }
  startAmbient(duration=30){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    [130.81,196,261.63].forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();
      o.type='sine';o.frequency.value=freq;o.detune.value=(i-1)*8;
      f.type='lowpass';f.frequency.value=600;f.Q.value=0.5;
      g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.03,now+1);
      g.gain.setValueAtTime(0.03,now+duration-2);g.gain.linearRampToValueAtTime(0,now+duration);
      o.connect(f);f.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+duration);
    });
    const buf=c.createBuffer(1,c.sampleRate*duration,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const s=c.createBufferSource(),lp=c.createBiquadFilter(),gn=c.createGain();
    s.buffer=buf;lp.type='lowpass';lp.frequency.value=350;lp.Q.value=0.3;
    gn.gain.setValueAtTime(0,now);gn.gain.linearRampToValueAtTime(0.018,now+1);
    gn.gain.setValueAtTime(0.018,now+duration-2);gn.gain.linearRampToValueAtTime(0,now+duration);
    s.connect(lp);lp.connect(gn);gn.connect(this.gains.master);s.start(now);
  }
  /* Glass shatter: bright transient + high-freq tinkles + trailing shards */
  crack() {
    this.ensureCtx(); const c = this.ctx, n = c.currentTime;
    /* Layer 1: Sharp bright initial crack (very short, very high freq) */
    const buf = c.createBuffer(1, c.sampleRate * 0.15, c.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const env = Math.exp(-i / (c.sampleRate * 0.003));
      d[i] = (Math.random() * 2 - 1) * env;
    }
    const s = c.createBufferSource(), hp = c.createBiquadFilter(), g = c.createGain();
    s.buffer = buf; hp.type = 'highpass'; hp.frequency.value = 4000; hp.Q.value = 0.7;
    g.gain.setValueAtTime(1.0, n); g.gain.exponentialRampToValueAtTime(0.001, n + 0.08);
    s.connect(hp); hp.connect(g); g.connect(this.gains.master); s.start(n);
    /* Layer 2: Glass resonance tinkles (multiple high sine pings) */
    [3200, 4800, 6400, 7600, 9000].forEach((freq, i) => {
      const o = c.createOscillator(), gn = c.createGain();
      o.type = 'sine'; o.frequency.value = freq + (Math.random() - 0.5) * 400;
      const delay = i * 0.012;
      gn.gain.setValueAtTime(0, n + delay);
      gn.gain.linearRampToValueAtTime(0.25 - i * 0.03, n + delay + 0.002);
      gn.gain.exponentialRampToValueAtTime(0.001, n + delay + 0.06 + Math.random() * 0.04);
      o.connect(gn); gn.connect(this.gains.master);
      o.start(n + delay); o.stop(n + delay + 0.12);
    });
    /* Layer 3: Trailing glass shards (tiny bright noise bursts scattered over 0.4s) */
    for (let i = 0; i < 8; i++) {
      const t0 = n + 0.03 + Math.random() * 0.35;
      const dur = 0.008 + Math.random() * 0.015;
      const bShard = c.createBuffer(1, Math.floor(c.sampleRate * dur), c.sampleRate);
      const dShard = bShard.getChannelData(0);
      for (let j = 0; j < dShard.length; j++) dShard[j] = (Math.random() * 2 - 1) * Math.exp(-j / (dShard.length * 0.3));
      const sShard = c.createBufferSource(), hpShard = c.createBiquadFilter(), gShard = c.createGain();
      sShard.buffer = bShard; hpShard.type = 'highpass';
      hpShard.frequency.value = 5000 + Math.random() * 5000; hpShard.Q.value = 2 + Math.random() * 4;
      gShard.gain.setValueAtTime(0.15 + Math.random() * 0.15, t0);
      gShard.gain.exponentialRampToValueAtTime(0.001, t0 + dur + 0.02);
      sShard.connect(hpShard); hpShard.connect(gShard); gShard.connect(this.gains.master); sShard.start(t0);
    }
    /* Layer 4: Subtle low impact thud (the thing hitting the glass) */
    const oLow = c.createOscillator(), gLow = c.createGain();
    oLow.type = 'sine'; oLow.frequency.setValueAtTime(180, n); oLow.frequency.exponentialRampToValueAtTime(40, n + 0.08);
    gLow.gain.setValueAtTime(0.5, n); gLow.gain.exponentialRampToValueAtTime(0.001, n + 0.1);
    oLow.connect(gLow); gLow.connect(this.gains.master); oLow.start(n); oLow.stop(n + 0.1);
  }
  /* Reverse crack: reversed envelope noise + ascending low tone */
  reverseCrack() {
    this.ensureCtx(); const c = this.ctx, n = c.currentTime;
    const buf = c.createBuffer(1, c.sampleRate * 0.7, c.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const p = i / d.length;
      const env = Math.pow(p, 3) * Math.exp(-(p - 1) * 3);
      d[i] = (Math.random() * 2 - 1) * env * 0.8;
    }
    const s = c.createBufferSource(), lp = c.createBiquadFilter(), g = c.createGain();
    s.buffer = buf; lp.type = 'lowpass';
    lp.frequency.setValueAtTime(500, n); lp.frequency.linearRampToValueAtTime(3000, n + 0.5);
    g.gain.setValueAtTime(0.6, n); g.gain.exponentialRampToValueAtTime(0.001, n + 0.7);
    s.connect(lp); lp.connect(g); g.connect(this.gains.master); s.start(n);
    // Ascending low tone 80 -> 200Hz
    const o = c.createOscillator(), g2 = c.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(80, n); o.frequency.linearRampToValueAtTime(200, n + 0.6);
    g2.gain.setValueAtTime(0.35, n); g2.gain.setValueAtTime(0.35, n + 0.4);
    g2.gain.exponentialRampToValueAtTime(0.001, n + 0.65);
    o.connect(g2); g2.connect(this.gains.master); o.start(n); o.stop(n + 0.65);
  }
  /* Text impact: deep thump sine 150->30Hz + noise transient */
  impact() {
    this.ensureCtx(); const c = this.ctx, n = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(150, n); o.frequency.exponentialRampToValueAtTime(30, n + 0.2);
    g.gain.setValueAtTime(0.7, n); g.gain.exponentialRampToValueAtTime(0.001, n + 0.25);
    o.connect(g); g.connect(this.gains.master); o.start(n); o.stop(n + 0.25);
    const buf = c.createBuffer(1, c.sampleRate * 0.15, c.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (c.sampleRate * 0.02));
    const s = c.createBufferSource(), g2 = c.createGain(); s.buffer = buf;
    g2.gain.setValueAtTime(0.5, n); g2.gain.exponentialRampToValueAtTime(0.001, n + 0.12);
    s.connect(g2); g2.connect(this.gains.master); s.start(n);
  }
  /* Beat drop: deep bass 80->35Hz sine + noise burst */
  beatDrop() {
    this.ensureCtx(); const c = this.ctx, n = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(80, n); o.frequency.exponentialRampToValueAtTime(35, n + 0.4);
    g.gain.setValueAtTime(0.8, n); g.gain.exponentialRampToValueAtTime(0.001, n + 0.5);
    o.connect(g); g.connect(this.gains.master); o.start(n); o.stop(n + 0.5);
    const buf = c.createBuffer(1, c.sampleRate * 0.2, c.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (c.sampleRate * 0.03));
    const s = c.createBufferSource(), g2 = c.createGain(); s.buffer = buf;
    g2.gain.setValueAtTime(0.6, n); g2.gain.exponentialRampToValueAtTime(0.001, n + 0.15);
    s.connect(g2); g2.connect(this.gains.master); s.start(n);
  }
  tick(f = 1000) { this.ensureCtx(); const c = this.ctx, n = c.currentTime, o = c.createOscillator(), g = c.createGain(); o.type = 'sine'; o.frequency.value = f; g.gain.setValueAtTime(.3, n); g.gain.exponentialRampToValueAtTime(.001, n + .08); o.connect(g); g.connect(this.gains.master); o.start(n); o.stop(n + .08); }
  pop() { this.ensureCtx(); const c = this.ctx, n = c.currentTime, o = c.createOscillator(), g = c.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(200, n + .1); g.gain.setValueAtTime(.4, n); g.gain.exponentialRampToValueAtTime(.001, n + .15); o.connect(g); g.connect(this.gains.master); o.start(n); o.stop(n + .15); }
  whoosh(p = 'mid') { this.ensureCtx(); const c = this.ctx, n = c.currentTime, b = c.createBuffer(1, c.sampleRate * .3, c.sampleRate), d = b.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (c.sampleRate * .08)); const s = c.createBufferSource(), f = c.createBiquadFilter(), g = c.createGain(); s.buffer = b; f.type = 'bandpass'; f.frequency.value = p === 'high' ? 4000 : p === 'low' ? 800 : 2000; f.Q.value = 1.5; g.gain.setValueAtTime(.25, n); g.gain.exponentialRampToValueAtTime(.001, n + .25); s.connect(f); f.connect(g); g.connect(this.gains.master); s.start(n); }
  ding(f = 880) { this.ensureCtx(); const c = this.ctx, n = c.currentTime, o = c.createOscillator(), g = c.createGain(); o.type = 'sine'; o.frequency.value = f; g.gain.setValueAtTime(.3, n); g.gain.exponentialRampToValueAtTime(.001, n + .4); o.connect(g); g.connect(this.gains.master); o.start(n); o.stop(n + .4); }
  slideUp() { this.ensureCtx(); const c = this.ctx, n = c.currentTime, o = c.createOscillator(), g = c.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(300, n); o.frequency.exponentialRampToValueAtTime(900, n + .2); g.gain.setValueAtTime(.2, n); g.gain.exponentialRampToValueAtTime(.001, n + .25); o.connect(g); g.connect(this.gains.master); o.start(n); o.stop(n + .25); }
  confirm() { this.ensureCtx(); const c = this.ctx, n = c.currentTime; [700, 900, 1100].forEach((f, i) => { const o = c.createOscillator(), g = c.createGain(); o.type = 'sine'; o.frequency.value = f; const t = n + i * .08; g.gain.setValueAtTime(.25, t); g.gain.exponentialRampToValueAtTime(.001, t + .15); o.connect(g); g.connect(this.gains.master); o.start(t); o.stop(t + .15); }); }
  thump() { this.ensureCtx(); const c = this.ctx, n = c.currentTime, o = c.createOscillator(), g = c.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(120, n); o.frequency.exponentialRampToValueAtTime(40, n + .2); g.gain.setValueAtTime(.5, n); g.gain.exponentialRampToValueAtTime(.001, n + .25); o.connect(g); g.connect(this.gains.master); o.start(n); o.stop(n + .25); }
}

/* ├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р
   LOGO
   ├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р */
function Logo({ size = 80, color = C.red }) {

   TIMELINE
   ├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р */
const TH = {
  silence:    { s: 0,     e: 0.3   },
  crack:      { s: 0.3,   e: 6.3   },
  text1:      { s: 3.0,   e: 4.5   },
  text2:      { s: 4.5,   e: 6.3   },
  hold1:      { s: 6.3,   e: 8.0   },
  reassemble: { s: 8.0,   e: 14.0  },
  fixed:      { s: 14.0,  e: 15.0  },
  logoMark:   { s: 14.5,  e: 15.0  },
  beatDrop:   { s: 15.0,  e: 15.0  },
};
const TB = {
  formTitle:  { s: 15.0, e: 15.8 },
  formFill:   { s: 15.8, e: 20.0 },
  formSubmit: { s: 20.0, e: 20.7 },
  cards:      { s: 20.7, e: 23.0 },

};

/* ├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р
   SCENE: HOOK (Glass Shatter)
   ├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р */
function SceneHook({ t, videoRef }) {
  if (t > TH.beatDrop.e + 0.5) return null;

  const crackP = t >= TH.crack.s ? clamp((t - TH.crack.s) / 0.2, 0, 1) : 0;
  const videoVisible = t >= TH.crack.s;
  const afterReverse = t >= TH.reassemble.e ? clamp((t - TH.reassemble.e) / 0.3, 0, 1) : 0;
  const videoOpacity = videoVisible ? (1 - afterReverse) : 0;

  const text1Raw = t >= TH.text1.s ? clamp((t - TH.text1.s) / 0.15, 0, 1) : 0;
  const text1T = ease.outCubic(text1Raw);
  const text2Raw = t >= TH.text2.s ? clamp((t - TH.text2.s) / 0.2, 0, 1) : 0;
  const text2T = ease.outCubic(text2Raw);

  const fixedRaw = t >= TH.fixed.s ? clamp((t - TH.fixed.s) / 0.3, 0, 1) : 0;
  const fixedT = ease.outBack(fixedRaw);
  const logoRaw = t >= TH.logoMark.s ? clamp((t - TH.logoMark.s) / 0.4, 0, 1) : 0;
  const logoT = ease.outCubic(logoRaw);

  const beatT = t >= TH.beatDrop.s ? 1 : 0;
  const reassFade = t >= TH.reassemble.s ? clamp((t - TH.reassemble.s) / 0.3, 0, 1) : 0;

  const shakeX = crackP > 0 && crackP < 1 ? (Math.sin(t * 180) * 6 * (1 - crackP)) : 0;
  const shakeY = crackP > 0 && crackP < 1 ? (Math.cos(t * 220) * 4 * (1 - crackP)) : 0;

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 20, background: C.white,
      opacity: 1 - beatT,
      transform: `translate(${shakeX}px, ${shakeY}px)`,
    }}>
      <video
        ref={videoRef}
        src="shatter.mp4"
        muted
        playsInline
        preload="auto"
        style={{
          position: 'absolute', inset: 0, width: '100%', height: '100%',
          objectFit: 'contain', zIndex: 30, pointerEvents: 'none',
          opacity: videoOpacity,
        }}
      />

      {/* "The off campus housing market" - drops in with impact */}
      {text1Raw > 0 && reassFade < 1 && (
        <div style={{
          position: 'absolute', top: '34%', left: 60, right: 60,
          textAlign: 'center', zIndex: 35,
          opacity: text1T * (1 - reassFade),
          transform: `translateY(${(1 - text1T) * 60}px)`,
        }}>
          <div style={{
            fontWeight: 900, fontSize: 76, lineHeight: 1.05,
            letterSpacing: '-.04em', color: C.white,
            textShadow: '0 2px 12px rgba(0,0,0,0.7), 0 0 4px rgba(0,0,0,0.4)',
          }}>
            The off campus<br />housing market
          </div>
        </div>
      )}

      {/* "is broken." - lands slower, larger, like a verdict */}
      {text2Raw > 0 && reassFade < 1 && (
        <div style={{
          position: 'absolute', top: '55%', left: 60, right: 60,
          textAlign: 'center', zIndex: 35,
          opacity: text2T * (1 - reassFade),
          transform: `translateY(${(1 - text2T) * 40}px)`,
        }}>
          <div style={{
            fontWeight: 900, fontSize: 96, lineHeight: 1,
            letterSpacing: '-.04em', color: C.white,
            textShadow: '0 2px 12px rgba(0,0,0,0.7), 0 0 4px rgba(0,0,0,0.4)',
          }}>
            is <span style={{ color: C.red }}>broken.</span>
          </div>
        </div>
      )}

      {/* "So we fixed it." on clean white frame */}
      {fixedRaw > 0 && (
        <div style={{
          position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center', zIndex: 40,
          opacity: fixedRaw,
        }}>
          <div style={{
            fontWeight: 900, fontSize: 96, letterSpacing: '-.04em',
            color: C.red,
            transform: `translateY(${(1 - fixedT) * 30}px)`,
          }}>
            So we fixed it.
          </div>
          {logoRaw > 0 && (
            <div style={{
              marginTop: 36, opacity: logoT,
              transform: `scale(${.8 + logoT * .2})`,
            }}>
              <Logo size={90} color={C.red} />
            </div>
          )}
        </div>
      )}
    </div>
  );
}

        {pills&&pills.length>0&&(
          <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
            {pills.map((p,i)=>(
              <div key={i} style={{padding:'5px 12px',borderRadius:999,background:C.red,color:C.white,fontSize:15,fontWeight:700}}>{p}</div>
            ))}
          </div>
        )}
      </div>

  );
}

function SceneCards({t}){
  if(t<TB.cards.s||t>TB.notSure.e+0.3)return null;
  const lt=t-TB.cards.s;
  const inT=clamp(lt/0.3,0,1);
  const nst=t>=TB.notSure.s?clamp((t-TB.notSure.s)/0.4,0,1):0;
  const exitF=t>TB.notSure.e-0.3?clamp((t-(TB.notSure.e-0.3))/0.3,0,1):0;
  /* "Not sure yet" press animation: appears, then after 0.5s presses down for 0.3s, holds 0.2s, releases 0.2s */
  const nsAppearEnd=TB.notSure.s+0.4;
  const pressStart=nsAppearEnd+0.3;
  const pressDown=t>=pressStart?clamp((t-pressStart)/0.25,0,1):0;
  const pressHoldEnd=pressStart+0.25+0.2;
  const pressUp=t>=pressHoldEnd?clamp((t-pressHoldEnd)/0.2,0,1):0;
  const pressScale=pressDown>0?(pressUp>0?1-pressUp*0.05:0.92+0.03*(1-ease.outCubic(pressDown))):1;
  const pressedState=pressDown>0.5;
  return(
    <div style={{position:'absolute',inset:0,zIndex:15,background:C.offWhite,opacity:inT*(1-exitF),display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:110}}>
      <div style={{width:'100%',padding:'0 48px'}}>
        <div style={{fontWeight:800,fontSize:28,color:C.dark,marginBottom:16}}>Your matches</div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <MatchCard lt={lt} delay={0.2} badge={true} name="6040 Kingsbury Ave" hood="St. Louis, MO 63112" price="$1,395/mo" specs="2 bed | 1 bath | Standard" walkCampus="19 min" walkShuttle="1 min" photo={PHOTOS.card1} pills={['Walking distance','Near nightlife']}/>
          <MatchCard lt={lt} delay={0.5} badge={false} name="Tanjiers" hood="5522 Delmar Blvd, St. Louis, MO 63112" price="$938-$1,169/mo" specs="0-2 bed | 1 bath | Standard" walkCampus="34 min" walkShuttle="2 min" photo={PHOTOS.card2} pills={['Near restaurants']}/>
        </div>
        <div style={{marginTop:20,textAlign:'center',opacity:nst,transform:`translateY(${(1-ease.outCubic(nst))*20}px)`}}>
          <div style={{
            display:'inline-block',padding:'16px 48px',borderRadius:999,
            border:`2.5px solid ${pressedState?C.red:'rgba(0,0,0,.12)'}`,
            fontWeight:700,fontSize:26,
            color:pressedState?C.red:C.gray,
            background:pressedState?'rgba(226,58,47,.06)':'transparent',
            transform:`scale(${pressScale})`,
            boxShadow:pressedState?'0 2px 8px rgba(226,58,47,.15)':'none',
            transition:'border-color 0.1s, color 0.1s, background 0.1s',
          }}>Not sure yet</div>
        </div>
      </div>
    </div>
  );
}

function ChatBubble({from,text,delay,lt}){
  const t=clamp((lt-delay)/0.4,0,1);

  const isBot=from==='bot';
  return(
    <div style={{display:'flex',justifyContent:isBot?'flex-start':'flex-end',marginBottom:18,opacity:t,transform:`translateY(${(1-e)*20}px)`}}>
      <div style={{
        maxWidth:'80%',padding:'22px 26px',borderRadius:22,

  );
}

function SceneChat({t}){
  if(t<TB.chat.s||t>TB.listing.s+0.3)return null;

  const exitF=t>TB.listing.s-0.3?clamp((t-(TB.listing.s-0.3))/0.3,0,1):0;

  /* Card click: press down at lt=3.8, hold, release, then scene exits */
  const clickStart=3.8;

  const clickHold=clickStart+0.12+0.15;
  const clickUp=lt>=clickHold?clamp((lt-clickHold)/0.1,0,1):0;

  return(
    <div style={{position:'absolute',inset:0,zIndex:15,background:C.offWhite,opacity:inT*(1-exitF),display:'flex',alignItems:'center',justifyContent:'center'}}>

              borderRadius:22,background:C.white,overflow:'hidden',

              border:`2.5px solid ${clickHighlight?C.red:'rgba(226,58,47,.4)'}`,
            }}>
              <img src={PHOTOS.chatCard} style={{width:'100%',height:300,objectFit:'cover',display:'block'}}/>
              <div style={{padding:'20px 24px'}}>
                <div style={{fontWeight:800,fontSize:28,color:C.dark}}>Park Lux</div>
                <div style={{fontSize:19,color:C.gray,marginTop:4}}>5560 Pershing Ave, St. Louis, MO 63112</div>
                <div style={{fontWeight:800,fontSize:26,color:C.dark,marginTop:8}}>$1,420-$1,520/mo</div>
                <div style={{fontSize:19,color:C.gray,marginTop:5}}>2 bed | 1-1.5 bath | Standard</div>
                <div style={{display:'flex',alignItems:'center',gap:20,marginTop:10}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:19,fontWeight:700,color:C.red}}>33 min</span>
                    <span style={{fontSize:17,color:C.gray}}>campus</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:19,fontWeight:700,color:C.green}}>6 min</span>
                    <span style={{fontSize:17,color:C.gray}}>shuttle</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function SceneListing({t}){
  if(t<TB.listing.s||t>TB.tour.e+0.3)return null;

  const inT=clamp(lt/0.5,0,1);

  return(

      <div style={{
        width:'calc(100% - 64px)',
        borderRadius:24,background:C.white,overflow:'hidden',
        boxShadow:'0 20px 60px rgba(0,0,0,.12)',

      }}>

          <div style={{fontWeight:800,fontSize:32,color:C.dark,marginTop:10}}>$1,420-$1,520/mo</div>
          <div style={{fontSize:20,color:C.gray,marginTop:6}}>2 bed | 1-1.5 bath | Standard</div>
          <div style={{marginTop:14,fontSize:20,color:C.gray,lineHeight:1.5}}>Spacious units near the Loop with modern finishes, in-unit laundry, and walkable access to campus...</div>
          {/* Commute row */}
          <div style={{display:'flex',gap:12,marginTop:14,flexWrap:'wrap'}}>

              const at=clamp((lt-0.4-i*0.12)/0.25,0,1);
              return <div key={i} style={{padding:'8px 16px',borderRadius:12,background:C.redTint,fontSize:18,fontWeight:700,color:C.red,opacity:at}}>{a}</div>;
            })}
          </div>
          <div style={{marginTop:12}}>
            <div style={{display:'inline-block',padding:'8px 16px',borderRadius:10,background:'rgba(34,197,94,.1)',fontSize:18,fontWeight:700,color:C.green}}>Utilities Included</div>
          </div>
          {/* Request Tour button */}
          <div style={{marginTop:24}}>
            <div style={{
              textAlign:'center',padding:'22px 0',borderRadius:999,
              background:confirmed?C.green:C.red,color:C.white,fontWeight:800,fontSize:28,
              boxShadow:confirmed?'0 6px 20px rgba(34,197,94,.3)':'0 6px 20px rgba(226,58,47,.3)',
              transform:`scale(${tourScale})`,
            }}>{confirmed?'тЬУ Tour Requested':'Request Tour'}</div>
          </div>

      </div>
    </div>
  );
}

function SceneCTA({t}){
  if(t<TB.cta.s)return null;
  const lt=t-TB.cta.s;
  const logoT=clamp(lt/0.5,0,1);
  const tagT=clamp((lt-0.4)/0.5,0,1);
  const btnT=clamp((lt-0.9)/0.5,0,1);

  const pulse=1+Math.sin(lt*4)*0.015*clamp((lt-1.4)*2,0,1);

        <div style={{fontWeight:900,fontSize:80,letterSpacing:'-.04em',color:C.dark}}>Proximity</div>

      </div>
      <div style={{marginTop:32,opacity:freeT}}>

}

/* ├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р
   MAIN APP
   ├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р├втАв┬Р */
function App() {
  const [started, setStarted] = React.useState(false);
  const [t, setT] = React.useState(0);
  const [done, setDone] = React.useState(false);
  const [zoom, setZoom] = React.useState(1);
  const sfxRef = React.useRef(null);
  const firedRef = React.useRef(new Set());
  const videoRef = React.useRef(null);

  // Zoom scaling to fit viewport
  React.useEffect(() => {
    const m = () => setZoom(Math.min(window.innerWidth / 1080, window.innerHeight / 1920));
    m(); window.addEventListener('resize', m);
    return () => window.removeEventListener('resize', m);
  }, []);

  // SFX triggers
  React.useEffect(() => {
    if (!started || done) return;
    const sfx = sfxRef.current; if (!sfx) return;
    const fired = firedRef.current;
    const fire = (k, time, fn) => { if (t >= time && !fired.has(k)) { fired.add(k); fn(); } };

    // Hook sounds
    fire('videoPlay', TH.crack.s, () => {
      const v = videoRef.current;
      if (v) { v.currentTime = 0; v.playbackRate = 1.0; v.play().catch(() => {}); }
    });
    fire('videoPause', TH.hold1.s, () => {
      const v = videoRef.current;
      if (v) v.pause();
    });
    fire('reversePlay', TH.reassemble.s, () => {
      const v = videoRef.current;
      if (v) { v.playbackRate = -1; v.play().catch(() => {}); }
    });
    fire('reversePause', TH.reassemble.e, () => {
      const v = videoRef.current;
      if (v) v.pause();
    });
    fire('impact1', TH.text1.s, () => sfx.impact());
    fire('impact2', TH.text2.s, () => sfx.impact());
    fire('fixedHit', TH.fixed.s, () => sfx.impact());
    fire('beatDrop', TH.beatDrop.s, () => sfx.beatDrop());

    // Body sounds
    fire('f1', TB.formFill.s + .1, () => sfx.tick(1100));
    fire('f2', TB.formFill.s + 1.1, () => sfx.tick(1100));
    fire('f3', TB.formFill.s + 2.1, () => sfx.tick(1100));
    fire('f4', TB.formFill.s + 3.1, () => sfx.tick(1100));
    fire('fb', TB.formSubmit.s + .1, () => sfx.pop());
    fire('c1', TB.cards.s + .3, () => sfx.slideUp());
    fire('c2', TB.cards.s + .6, () => sfx.slideUp());
    fire('ns', TB.notSure.s + .1, () => sfx.tick(800));
    fire('ch1', TB.chat.s + .3, () => sfx.ding(900));
    fire('ch2', TB.chat.s + 1.3, () => sfx.ding(700));
    fire('ch3', TB.chat.s + 2.3, () => sfx.ding(900));
    fire('chc', TB.chat.s + 3.1, () => sfx.whoosh());
    fire('lo', TB.listing.s + .1, () => sfx.whoosh('high'));
    fire('tr', TB.tour.s + .1, () => sfx.pop());
    fire('tc', TB.tour.s + .7, () => sfx.confirm());
    fire('ci', TB.cta.s + .1, () => sfx.thump());
  }, [t, started, done]);

  // Animation frame loop
  React.useEffect(() => {
    if (!started) return;
    let raf;
    const s = performance.now();
    const tick = n => {
      const e = (n - s) / 1000;
      setT(e);
      if (e >= TOTAL) { setDone(true); return; }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [started]);

  const begin = async () => {
    if (!sfxRef.current) sfxRef.current = new SfxEngine();
    sfxRef.current.ensureCtx();
    try { await sfxRef.current.ctx.resume(); } catch {}
    firedRef.current = new Set();
    const v = videoRef.current;
    if (v) { v.muted = false; v.currentTime = 0; }
    setStarted(true); setDone(false); setT(0);
  };
  const restart = () => {
    setStarted(false); setDone(false); setT(0);
    setTimeout(begin, 60);
  };

  const showChrome = started && !done && t > TB.formTitle.s && t < TB.cta.s;

  return (
    <div style={{
      position: 'fixed', inset: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: '#000',
    }}>
      <div style={{
        width: 1080, height: 1920, position: 'relative',
        overflow: 'hidden', zoom, background: C.offWhite,
      }}>
        <Chrome visible={showChrome} />
        <SceneHook t={t} videoRef={videoRef} />
        <SceneFormTitle t={t} />
        <SceneForm t={t} />
        <SceneCards t={t} />
        <SceneChat t={t} />
        <SceneListing t={t} />
        <SceneCTA t={t} />

        {/* Tap to play splash */}
        {!started && (
          <div onClick={begin} style={{
            position: 'absolute', inset: 0, zIndex: 500,
            background: '#0A0A0B', display: 'grid', placeItems: 'center',
            cursor: 'pointer',
          }}>
            <div style={{ textAlign: 'center', color: '#fff' }}>
              <div style={{ margin: '0 auto 24px' }}>
                <Logo size={120} color={C.red} />
              </div>
              <div style={{ fontWeight: 900, fontSize: 64, letterSpacing: '-.04em' }}>Proximity</div>
              <div style={{
                marginTop: 12, fontWeight: 700, fontSize: 18,
                letterSpacing: '.3em', textTransform: 'uppercase',
                color: 'rgba(255,255,255,.5)',
              }}>glass shatter hook ├В┬╖ sound on</div>
              <div style={{
                marginTop: 48, width: 100, height: 100, borderRadius: '50%',
                background: C.red, display: 'inline-flex',
                alignItems: 'center', justifyContent: 'center', position: 'relative',
              }}>
                <div style={{
                  width: 0, height: 0,
                  borderLeft: '28px solid #fff',
                  borderTop: '18px solid transparent',
                  borderBottom: '18px solid transparent',
                  marginLeft: 8,
                }} />
                <span style={{
                  position: 'absolute', inset: 0, borderRadius: '50%',
                  background: C.red, animation: 'pulse 1.8s ease-out infinite', zIndex: -1,
                }} />
              </div>
              <div style={{
                marginTop: 20, fontWeight: 500, fontSize: 22,
                color: 'rgba(255,255,255,.7)',
              }}>tap to play with sound</div>
            </div>
          </div>
        )}

        {/* Replay button */}
        {done && (
          <div onClick={restart} style={{
            position: 'absolute', inset: 0, zIndex: 500,
            display: 'grid', placeItems: 'end center', paddingBottom: 80,
            cursor: 'pointer',
          }}>
            <div style={{
              padding: '16px 40px',
              background: 'rgba(255,255,255,.1)',
              border: '1px solid rgba(255,255,255,.2)',
              backdropFilter: 'blur(10px)',
              color: '#fff', borderRadius: 999, fontWeight: 700,
              fontSize: 20, letterSpacing: '.15em', textTransform: 'uppercase',
            }}>tap to replay</div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
