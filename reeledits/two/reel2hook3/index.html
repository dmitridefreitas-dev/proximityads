const C={red:'#E23A2F',white:'#FFFFFF',offWhite:'#FAFAFA',redTint:'#FBE6E4',dark:'#0A0A0A',gray:'#555555',black:'#000000',green:'#22C55E'};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const ease={
  outCubic:t=>(--t)*t*t+1,
  outBack:t=>{const c=1.70158,d=c+1;return 1+d*Math.pow(t-1,3)+c*Math.pow(t-1,2)},
  outQuad:t=>t*(2-t),
  outExpo:t=>t===1?1:1-Math.pow(2,-10*t),
};

/* ── SFX Engine ── */
class SfxEngine{
  constructor(){this.ctx=null;this.gains={master:null};this.droneOsc=null;this.droneGain=null;this.droneLp=null;}
  ensureCtx(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.gains.master=this.ctx.createGain();
    this.gains.master.gain.value=0.7;
    this.gains.master.connect(this.ctx.destination);
  }
  startAmbient(duration=30){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    [130.81,196,261.63].forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();
      o.type='sine';o.frequency.value=freq;o.detune.value=(i-1)*8;
      f.type='lowpass';f.frequency.value=600;f.Q.value=0.5;
      g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.03,now+0.5);
      g.gain.setValueAtTime(0.03,now+duration-1.5);g.gain.linearRampToValueAtTime(0,now+duration);
      o.connect(f);f.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+duration);
    });
    const buf=c.createBuffer(1,c.sampleRate*duration,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const s=c.createBufferSource(),lp=c.createBiquadFilter(),gn=c.createGain();
    s.buffer=buf;lp.type='lowpass';lp.frequency.value=350;lp.Q.value=0.3;
    gn.gain.setValueAtTime(0,now);gn.gain.linearRampToValueAtTime(0.018,now+0.5);
    gn.gain.setValueAtTime(0.018,now+duration-1.5);gn.gain.linearRampToValueAtTime(0,now+duration);
    s.connect(lp);lp.connect(gn);gn.connect(this.gains.master);s.start(now);
  }
  thud(intensity=0.4){
    this.ensureCtx();const c=this.ctx,n=c.currentTime;
    /* sub bass thud */
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(100*intensity+60,n);
    o.frequency.exponentialRampToValueAtTime(25,n+0.15);
    g.gain.setValueAtTime(intensity,n);
    g.gain.exponentialRampToValueAtTime(0.001,n+0.18);
    o.connect(g);g.connect(this.gains.master);o.start(n);o.stop(n+0.2);
    /* noise layer for impact texture */
    const buf=c.createBuffer(1,c.sampleRate*0.08,c.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.015))*intensity;
    const s=c.createBufferSource(),g2=c.createGain();s.buffer=buf;
    g2.gain.setValueAtTime(intensity*0.5,n);
    g2.gain.exponentialRampToValueAtTime(0.001,n+0.06);
    s.connect(g2);g2.connect(this.gains.master);s.start(n);
  }
  startDrone(){
    this.ensureCtx();const c=this.ctx,n=c.currentTime;
    if(this.droneOsc)return;
    this.droneOsc=c.createOscillator();
    this.droneGain=c.createGain();
    this.droneLp=c.createBiquadFilter();
    this.droneOsc.type='sawtooth';
    this.droneOsc.frequency.value=55;
    this.droneLp.type='lowpass';
    this.droneLp.frequency.value=200;
    this.droneGain.gain.setValueAtTime(0,n);
    this.droneOsc.connect(this.droneLp);
    this.droneLp.connect(this.droneGain);
    this.droneGain.connect(this.gains.master);
    this.droneOsc.start(n);
  }
  setDroneLevel(level){
    if(!this.droneGain)return;
    const n=this.ctx.currentTime;
    this.droneGain.gain.linearRampToValueAtTime(clamp(level,0,0.6),n+0.08);
  }
  stopDrone(){
    if(!this.droneOsc)return;
    try{
      const n=this.ctx.currentTime;
      this.droneGain.gain.cancelScheduledValues(n);
      this.droneGain.gain.setValueAtTime(this.droneGain.gain.value,n);
      this.droneGain.gain.linearRampToValueAtTime(0,n+0.02);
      const osc=this.droneOsc;
      setTimeout(()=>{try{osc.stop();}catch{}},100);
      this.droneOsc=null;this.droneGain=null;this.droneLp=null;
    }catch(e){}
  }
  beatDrop(){
    this.ensureCtx();const c=this.ctx,n=c.currentTime;
    /* deep bass sweep */
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(80,n);o.frequency.exponentialRampToValueAtTime(35,n+0.4);
    g.gain.setValueAtTime(0.8,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.5);
    o.connect(g);g.connect(this.gains.master);o.start(n);o.stop(n+0.5);
    /* noise burst */
    const buf=c.createBuffer(1,c.sampleRate*0.2,c.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.04));
    const s=c.createBufferSource(),g2=c.createGain();s.buffer=buf;
    g2.gain.setValueAtTime(0.5,n);g2.gain.exponentialRampToValueAtTime(0.001,n+0.15);
    s.connect(g2);g2.connect(this.gains.master);s.start(n);
  }
  tick(f=1000){this.ensureCtx();const c=this.ctx,n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.3,n);g.gain.exponentialRampToValueAtTime(.001,n+.08);o.connect(g);g.connect(this.gains.master);o.start(n);o.stop(n+.08);}
  pop(){this.ensureCtx();const c=this.ctx,n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(600,n);o.frequency.exponentialRampToValueAtTime(200,n+.1);g.gain.setValueAtTime(.4,n);g.gain.exponentialRampToValueAtTime(.001,n+.15);o.connect(g);g.connect(this.gains.master);o.start(n);o.stop(n+.15);}
  whoosh(p='mid'){this.ensureCtx();const c=this.ctx,n=c.currentTime,b=c.createBuffer(1,c.sampleRate*.3,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*.08));const s=c.createBufferSource(),f=c.createBiquadFilter(),g=c.createGain();s.buffer=b;f.type='bandpass';f.frequency.value=p==='high'?4000:p==='low'?800:2000;f.Q.value=1.5;g.gain.setValueAtTime(.25,n);g.gain.exponentialRampToValueAtTime(.001,n+.25);s.connect(f);f.connect(g);g.connect(this.gains.master);s.start(n);}
  ding(f=880){this.ensureCtx();const c=this.ctx,n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.3,n);g.gain.exponentialRampToValueAtTime(.001,n+.4);o.connect(g);g.connect(this.gains.master);o.start(n);o.stop(n+.4);}
  slideUp(){this.ensureCtx();const c=this.ctx,n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(300,n);o.frequency.exponentialRampToValueAtTime(900,n+.2);g.gain.setValueAtTime(.2,n);g.gain.exponentialRampToValueAtTime(.001,n+.25);o.connect(g);g.connect(this.gains.master);o.start(n);o.stop(n+.25);}
  confirm(){this.ensureCtx();const c=this.ctx,n=c.currentTime;[700,900,1100].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;const t=n+i*.08;g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.connect(g);g.connect(this.gains.master);o.start(t);o.stop(t+.15);});}
  thump(){this.ensureCtx();const c=this.ctx,n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(120,n);o.frequency.exponentialRampToValueAtTime(40,n+.2);g.gain.setValueAtTime(.5,n);g.gain.exponentialRampToValueAtTime(.001,n+.25);o.connect(g);g.connect(this.gains.master);o.start(n);o.stop(n+.25);}
}

/* ── Screenshot Card Component — polaroid with actual image ── */
function ScreenshotCard({data,visible,t}){
  if(!visible)return null;
  const landDur=0.12;
  const landT=clamp(t/landDur,0,1);
  const eased=ease.outCubic(landT);
  const scaleBase=data.big?1.08:1;

  return(
    <div style={{
      position:'absolute',
      left:data.x,
      top:data.y,
      width:data.w,
      background:C.white,
      borderRadius:4,
      padding:'12px 12px 36px 12px',
      boxShadow:data.big
        ?'0 20px 60px rgba(0,0,0,.32), 0 2px 8px rgba(0,0,0,.12)'
        :'0 12px 40px rgba(0,0,0,.2), 0 1px 4px rgba(0,0,0,.08)',
      transform:`rotate(${data.rot}deg) scale(${(.85+eased*.15)*scaleBase}) translateY(${(1-eased)*60}px)`,
      opacity:landT,
      zIndex:Math.round(data.time*100)+(data.big?100:0),
      overflow:'hidden',
    }}>
      <img src={data.img} style={{
        width:'100%',
        height:'auto',
        display:'block',
        borderRadius:2,
      }}/>
    </div>
  );
}

/* ── HOOK TIMELINE ── */
const HOOK={
  pileEnd:4.05,       /* last screenshot lands */
  holdEnd:4.45,       /* hold pile visible */
  blackCut:4.45,      /* hard cut to black, instant silence */
  meetText:4.7,       /* "Meet Proximity." appears */
  meetHold:5.7,       /* hold the text — 1s visible */
  beatDrop:5.7,       /* beat drop, cut to body */
  hookEnd:6.0,        /* hook fully exits */
};
const TH_END=6.0;

/* ── BODY TIMELINE ── */
const TB={
  formTitle:{s:TH_END,          e:TH_END+0.8},
  formFill: {s:TH_END+0.8,     e:TH_END+5.0},
  formSubmit:{s:TH_END+5.0,    e:TH_END+5.7},
  cards:    {s:TH_END+5.7,     e:TH_END+8.0},
  notSure:  {s:TH_END+8.0,     e:TH_END+9.5},
  chat:     {s:TH_END+9.5,     e:TH_END+13.7},
  listing:  {s:TH_END+13.7,    e:TH_END+16.7},
  tour:     {s:TH_END+16.7,    e:TH_END+18.0},
  cta:      {s:TH_END+18.0,    e:TH_END+21.7},
};
const TOTAL=TH_END+21.7;

/* ── Hook Scene ── */
function SceneHook({t}){
  if(t>HOOK.hookEnd+0.3)return null;

  /* Pile visible until blackCut */
  const showPile=t<HOOK.blackCut;
  /* Black screen */
  const isBlack=t>=HOOK.blackCut;
  /* Meet text animation */
  const meetIn=t>=HOOK.meetText?clamp((t-HOOK.meetText)/0.25,0,1):0;
  /* Exit fade at beat drop */
  const exitF=t>=HOOK.beatDrop?clamp((t-HOOK.beatDrop)/0.3,0,1):0;

  return(
    <div style={{position:'absolute',inset:0,zIndex:20,opacity:1-exitF}}>
      {/* Pile-on background */}
      {showPile&&(
        <div style={{position:'absolute',inset:0,background:C.offWhite}}>
          {/* Subtle dark gradient building at bottom for mood */}
          <div style={{
            position:'absolute',bottom:0,left:0,right:0,height:'40%',
            background:'linear-gradient(transparent, rgba(0,0,0,0.06))',
            pointerEvents:'none',
          }}/>
          {SCREENSHOTS.map((ss,i)=>(
            <ScreenshotCard key={i} data={ss} visible={t>=ss.time} t={clamp(t-ss.time,0,2)}/>
          ))}
        </div>
      )}

      {/* Black frame + Meet Proximity */}
      {isBlack&&(
        <div style={{
          position:'absolute',inset:0,background:C.black,
          display:'flex',alignItems:'center',justifyContent:'center',
        }}>
          {meetIn>0&&(
            <div style={{
              opacity:meetIn,
              transform:`translateY(${(1-ease.outCubic(meetIn))*24}px)`,
            }}>
              <div style={{
                fontWeight:900,fontSize:88,letterSpacing:'-.04em',
                color:C.white,textAlign:'center',lineHeight:1.1,
              }}>
                Meet <span style={{color:C.red}}>Proximity.</span>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

  return(
    <div style={{
      padding:'28px 32px',borderRadius:20,background:C.white,

      <div style={{fontSize:17,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:C.gray,marginBottom:10}}>{label}</div>
      {done||active
        ?<div style={{fontSize:30,fontWeight:700,color:C.dark,whiteSpace:'pre-line',lineHeight:1.35}}>{value}</div>
        :<div style={{height:36,borderRadius:10,background:'rgba(0,0,0,.04)'}}/>
      }
    </div>
  );
}

function SceneFormTitle({t}){
  if(t<TB.formTitle.s||t>TB.formTitle.e+0.3)return null;
  const lt=t-TB.formTitle.s;
  const inT=clamp(lt/0.4,0,1);
  const exitF=lt>0.5?clamp((lt-0.5)/0.3,0,1):0;
  return(
    <div style={{position:'absolute',inset:0,zIndex:15,background:C.offWhite,display:'flex',alignItems:'center',justifyContent:'center',opacity:1-exitF}}>

/* ── App ── */
function App(){
  const[started,setStarted]=React.useState(false);
  const[t,setT]=React.useState(0);
  const[done,setDone]=React.useState(false);
  const[zoom,setZoom]=React.useState(1);
  const sfxRef=React.useRef(null);
  const firedRef=React.useRef(new Set());
  const startTimeRef=React.useRef(null);

  React.useEffect(()=>{
    const m=()=>setZoom(Math.min(window.innerWidth/1080,window.innerHeight/1920));
    m();window.addEventListener('resize',m);return()=>window.removeEventListener('resize',m);
  },[]);

  /* SFX dispatch — fires once per key when t crosses the threshold */
  React.useEffect(()=>{
    if(!started||done)return;
    const sfx=sfxRef.current;if(!sfx)return;
    const fired=firedRef.current;
    const fire=(k,time,fn)=>{if(t>=time&&!fired.has(k)){fired.add(k);fn();}};

    /* Phase 1 — soft isolated thuds (gain 0.3) */
    fire('t0',0,    ()=>sfx.thud(0.3));
    fire('t1',0.8,  ()=>sfx.thud(0.3));
    fire('t2',1.6,  ()=>sfx.thud(0.35));

    /* Phase 2 — louder thuds + tension drone starts */
    fire('drone',2.4,()=>{sfx.startDrone();sfx.setDroneLevel(0.1);});
    fire('t3',2.4,  ()=>sfx.thud(0.4));
    fire('t4',2.8,  ()=>{sfx.thud(0.45);sfx.setDroneLevel(0.2);});
    fire('t5',3.2,  ()=>{sfx.thud(0.5);sfx.setDroneLevel(0.3);});

    /* Phase 3 — rapid, loud, overlapping thuds; drone overwhelming */
    fire('t6',3.6,  ()=>{sfx.thud(0.55);sfx.setDroneLevel(0.38);});
    fire('t7',3.75, ()=>{sfx.thud(0.6);sfx.setDroneLevel(0.42);});
    fire('t8',3.9,  ()=>{sfx.thud(0.7);sfx.setDroneLevel(0.48);});
    fire('t9',4.05, ()=>{sfx.thud(0.85);sfx.setDroneLevel(0.55);});

    /* Instant silence at blackCut */
    fire('silence',HOOK.blackCut,()=>sfx.stopDrone());

    /* Beat drop */
    fire('beatDrop',HOOK.beatDrop,()=>sfx.beatDrop());

    /* Body SFX */
    fire('f1',TB.formFill.s+0.1,()=>sfx.tick(1100));
    fire('f2',TB.formFill.s+1.1,()=>sfx.tick(1100));
    fire('f3',TB.formFill.s+2.1,()=>sfx.tick(1100));
    fire('f4',TB.formFill.s+3.1,()=>sfx.tick(1100));
    fire('fb',TB.formSubmit.s+0.1,()=>sfx.pop());
    fire('c1',TB.cards.s+0.3,()=>sfx.slideUp());
    fire('c2',TB.cards.s+0.6,()=>sfx.slideUp());
    fire('ns',TB.notSure.s+0.1,()=>sfx.tick(800));
    fire('ch1',TB.chat.s+0.3,()=>sfx.ding(900));
    fire('ch2',TB.chat.s+1.3,()=>sfx.ding(700));
    fire('ch3',TB.chat.s+2.3,()=>sfx.ding(900));
    fire('chc',TB.chat.s+3.1,()=>sfx.whoosh());
    fire('lo',TB.listing.s+0.1,()=>sfx.whoosh('high'));
    fire('tr',TB.tour.s+0.1,()=>sfx.pop());
    fire('tc',TB.tour.s+0.7,()=>sfx.confirm());
    fire('ci',TB.cta.s+0.1,()=>sfx.thump());
  },[t,started,done]);

  /* Animation loop — uses ref-based start time so first frame is t=0 exactly */
  React.useEffect(()=>{
    if(!started)return;
    let raf;
    const tick=(now)=>{
      if(startTimeRef.current===null) startTimeRef.current=now;
      const elapsed=(now-startTimeRef.current)/1000;
      setT(elapsed);
      if(elapsed>=TOTAL){setDone(true);return;}
      raf=requestAnimationFrame(tick);
    };
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[started]);

  const begin=async()=>{
    if(!sfxRef.current) sfxRef.current=new SfxEngine();
    sfxRef.current.ensureCtx();
    try{await sfxRef.current.ctx.resume();}catch{}
    firedRef.current=new Set();
    startTimeRef.current=null;
    setT(0);
    setDone(false);
    /* Fire the first thud IMMEDIATELY before RAF starts so there's zero delay */
    sfxRef.current.thud(0.3);
    firedRef.current.add('t0');
    setStarted(true);
  };

  const restart=()=>{
    setStarted(false);setDone(false);setT(0);
    if(sfxRef.current)sfxRef.current.stopDrone();
    setTimeout(begin,80);
  };

  const showChrome=started&&!done&&t>TB.formTitle.s&&t<TB.cta.s;

  return(
    <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'#000'}}>
      <div style={{width:1080,height:1920,position:'relative',overflow:'hidden',zoom,background:C.offWhite}}>
        <Chrome visible={showChrome}/>
        <SceneHook t={t}/>
        <SceneFormTitle t={t}/>
        <SceneForm t={t}/>
        <SceneCards t={t}/>
        <SceneChat t={t}/>
        <SceneListing t={t}/>
        <SceneCTA t={t}/>

        {/* Tap-to-play splash */}
        {!started&&(
          <div onClick={begin} style={{position:'absolute',inset:0,zIndex:500,background:'#0A0A0B',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
            <Logo size={140} color={C.red}/>
            <div style={{marginTop:28,fontWeight:900,fontSize:72,letterSpacing:'-.04em',color:'#fff'}}>Proximity</div>
            <div style={{marginTop:14,fontWeight:700,fontSize:19,letterSpacing:'.3em',textTransform:'uppercase',color:'rgba(255,255,255,.45)'}}>screenshot pile-on hook &middot; sound on</div>
            <div style={{marginTop:60,width:110,height:110,borderRadius:'50%',background:C.red,display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
              <div style={{width:0,height:0,borderLeft:'30px solid #fff',borderTop:'20px solid transparent',borderBottom:'20px solid transparent',marginLeft:10}}/>
              <span style={{position:'absolute',inset:0,borderRadius:'50%',background:C.red,animation:'pulse 1.8s ease-out infinite',zIndex:-1}}/>
            </div>
          </div>
        )}

        {/* Replay button */}
        {done&&(
          <div onClick={restart} style={{position:'absolute',inset:0,zIndex:500,display:'flex',alignItems:'flex-end',justifyContent:'center',paddingBottom:100,cursor:'pointer'}}>
            <div style={{padding:'18px 44px',background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.2)',backdropFilter:'blur(10px)',color:'#fff',borderRadius:999,fontWeight:700,fontSize:22,letterSpacing:'.15em',textTransform:'uppercase'}}>&#8635; tap to replay</div>
          </div>
        )}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
