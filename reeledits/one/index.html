const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const ease = {
  outCubic: t=>(--t)*t*t+1,
  outBack: t=>{const c=1.70158,d=c+1;return 1+d*Math.pow(t-1,3)+c*Math.pow(t-1,2)},
  outQuad: t=>t*(2-t),
  inOutCubic: t=>t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1,
  outExpo: t=>t===1?1:1-Math.pow(2,-10*t),
};

/* ── SFX Engine ────────────────────────────────── */
class SfxEngine {
  constructor(){this.ctx=null;this.gains={master:null};this.ambientNodes=[];}
  ensureCtx(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.gains.master=this.ctx.createGain();
    this.gains.master.gain.value=0.6;
    const comp=this.ctx.createDynamicsCompressor();
    comp.threshold.value=-10;comp.ratio.value=4;comp.attack.value=0.003;comp.release.value=0.18;
    this.gains.master.connect(comp);comp.connect(this.ctx.destination);
  }
  startAmbient(duration=16){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    /* Warm pad: layered detuned sines with slow LFO for movement */
    [130.81,196,261.63,329.63].forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();
      o.type='sine';o.frequency.value=freq;
      /* Subtle detune for warmth */
      o.detune.value=(i-1.5)*6;
      f.type='lowpass';f.frequency.value=800;f.Q.value=0.5;
      /* Fade in over 1s, sustain, fade out over 1.5s */
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(0.035,now+1);
      g.gain.setValueAtTime(0.035,now+duration-2);
      g.gain.linearRampToValueAtTime(0,now+duration);
      o.connect(f);f.connect(g);g.connect(this.gains.master);
      o.start(now);o.stop(now+duration);
      this.ambientNodes.push(o);
    });
    /* Soft filtered noise bed for texture */
    const buf=c.createBuffer(1,c.sampleRate*duration,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const s=c.createBufferSource(),lp=c.createBiquadFilter(),gn=c.createGain();
    s.buffer=buf;lp.type='lowpass';lp.frequency.value=400;lp.Q.value=0.3;
    gn.gain.setValueAtTime(0,now);gn.gain.linearRampToValueAtTime(0.02,now+1);
    gn.gain.setValueAtTime(0.02,now+duration-2);gn.gain.linearRampToValueAtTime(0,now+duration);
    s.connect(lp);lp.connect(gn);gn.connect(this.gains.master);s.start(now);
    this.ambientNodes.push(s);
  }
  whoosh(pitch='mid'){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const buf=c.createBuffer(1,c.sampleRate*0.12,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.03));
    const s=c.createBufferSource(),f=c.createBiquadFilter(),g=c.createGain();
    s.buffer=buf;f.type='bandpass';
    f.frequency.value=pitch==='high'?4000:pitch==='low'?800:2000;f.Q.value=1.2;
    g.gain.setValueAtTime(0.011,now);g.gain.exponentialRampToValueAtTime(0.0001,now+0.1);
    s.connect(f);f.connect(g);g.connect(this.gains.master);s.start(now);
  }
  snap(){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const buf=c.createBuffer(1,c.sampleRate*0.04,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.006));
    const s=c.createBufferSource(),hp=c.createBiquadFilter(),g=c.createGain();
    s.buffer=buf;hp.type='highpass';hp.frequency.value=3000;hp.Q.value=0.7;
    g.gain.setValueAtTime(0.018,now);g.gain.exponentialRampToValueAtTime(0.0001,now+0.04);
    s.connect(hp);hp.connect(g);g.connect(this.gains.master);s.start(now);
  }
  swipe(){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const buf=c.createBuffer(1,c.sampleRate*0.08,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.02));
    const s=c.createBufferSource(),bp=c.createBiquadFilter(),g=c.createGain();
    s.buffer=buf;bp.type='bandpass';
    bp.frequency.setValueAtTime(1500,now);bp.frequency.exponentialRampToValueAtTime(5000,now+0.06);bp.Q.value=0.8;
    g.gain.setValueAtTime(0.009,now);g.gain.exponentialRampToValueAtTime(0.0001,now+0.07);
    s.connect(bp);bp.connect(g);g.connect(this.gains.master);s.start(now);
  }
  tick(freq=1100){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0.04,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
    o.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+0.15);
  }
  pop(){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(500,now);o.frequency.exponentialRampToValueAtTime(250,now+0.15);
    g.gain.setValueAtTime(0.05,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
    o.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+0.2);
    const o2=c.createOscillator(),g2=c.createGain();
    o2.type='sine';o2.frequency.value=350;
    g2.gain.setValueAtTime(0.015,now);g2.gain.exponentialRampToValueAtTime(0.001,now+0.3);
    o2.connect(g2);g2.connect(this.gains.master);o2.start(now);o2.stop(now+0.3);
  }
  thump(){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(90,now);o.frequency.exponentialRampToValueAtTime(30,now+0.3);
    g.gain.setValueAtTime(0.075,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
    o.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+0.35);
    const buf=c.createBuffer(1,c.sampleRate*0.06,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.02));
    const s=c.createBufferSource(),gn=c.createGain();
    s.buffer=buf;gn.gain.setValueAtTime(0.025,now);gn.gain.exponentialRampToValueAtTime(0.001,now+0.06);
    s.connect(gn);gn.connect(this.gains.master);s.start(now);
  }
  ding(freq=880){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0.04,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.6);
    o.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+0.6);
    const o2=c.createOscillator(),g2=c.createGain();
    o2.type='sine';o2.frequency.value=freq*2;
    g2.gain.setValueAtTime(0.01,now);g2.gain.exponentialRampToValueAtTime(0.001,now+0.4);
    o2.connect(g2);g2.connect(this.gains.master);o2.start(now);o2.stop(now+0.4);
  }
  impact(){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(60,now);o.frequency.exponentialRampToValueAtTime(25,now+0.2);
    g.gain.setValueAtTime(0.075,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
    o.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+0.3);
    const buf=c.createBuffer(1,c.sampleRate*0.1,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.03));
    const s=c.createBufferSource(),gn=c.createGain();
    s.buffer=buf;gn.gain.setValueAtTime(0.025,now);gn.gain.exponentialRampToValueAtTime(0.001,now+0.1);
    s.connect(gn);gn.connect(this.gains.master);s.start(now);
  }
  riser(dur=1.5){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const s=c.createBufferSource(),lp=c.createBiquadFilter(),g=c.createGain();
    s.buffer=buf;lp.type='bandpass';
    lp.frequency.setValueAtTime(200,now);lp.frequency.exponentialRampToValueAtTime(3000,now+dur);lp.Q.value=1.5;
    g.gain.setValueAtTime(0.003,now);g.gain.linearRampToValueAtTime(0.03,now+dur*0.8);g.gain.linearRampToValueAtTime(0,now+dur);
    s.connect(lp);lp.connect(g);g.connect(this.gains.master);s.start(now);
  }
  slideUp(){
    this.ensureCtx();const c=this.ctx,now=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(700,now+0.25);
    g.gain.setValueAtTime(0.03,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
    o.connect(g);g.connect(this.gains.master);o.start(now);o.stop(now+0.3);
  }
}

/* ── Timeline ─────────────────────────────────── */
const T={
  intro:   {s:0,   e:2.8},
  tabs:    {s:2.8, e:6.6},

/* ── Scene 1: Logo Intro ──────────────────────── */
function SceneIntro({t}){
  if(t>T.intro.e+0.4)return null;
  const lt=t-T.intro.s;
  const logoT=clamp(lt/0.6,0,1);
  const le=ease.outBack(logoT);
  const nameT=clamp((lt-0.3)/0.5,0,1);
  const ne=ease.outCubic(nameT);
  const subT=clamp((lt-0.6)/0.5,0,1);
  const exitF=lt>2.2?clamp((lt-2.2)/0.4,0,1):0;
  return(
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',opacity:1-exitF}}>
      <div style={{position:'relative',width:220,height:220}}>
        <svg width={220} height={220} viewBox="0 0 220 220" style={{position:'absolute',top:0,left:0}}>
          <circle cx={110} cy={110} r={100} fill="none" stroke={C.red} strokeWidth={4}
            strokeDasharray={628.3}
            strokeDashoffset={628.3*(1-logoT)}
            strokeLinecap="round"
            style={{transition:'none'}}
          />

        <div style={{position:'absolute',top:0,left:0,width:220,height:220,clipPath:`circle(${le*50}% at 50% 50%)`}}>

      <div style={{marginTop:20,fontWeight:700,fontSize:24,letterSpacing:'.28em',textTransform:'uppercase',color:C.red,opacity:subT,transform:`translateY(${(1-ease.outCubic(subT))*12}px)`}}>
        WashU off-campus housing
      </div>
    </div>
  );
}

/* ── Scene 2: 5 Tabs Zero Answers ────────────── */
function SceneTabs({t}){
  if(t<T.tabs.s||t>T.tabs.e+0.4)return null;
  const lt=t-T.tabs.s;
  const headT=clamp(lt/0.5,0,1);
  const he=ease.outCubic(headT);
  const tabs=[
    {fav:'Z',color:'#444',label:'zillow.com'},
    {fav:'A',color:'#666',label:'apartments.com'},
    {fav:'?',color:'#888',label:'random landlords'},
    {fav:'f',color:'#555',label:'Facebook groups'},
    {fav:'R',color:'#777',label:'reddit'},
  ];
  const exitF=lt>3.2?clamp((lt-3.2)/0.4,0,1):0;
  return(
    <div style={{position:'absolute',inset:0,opacity:1-exitF}}>
      <div style={{position:'absolute',left:80,right:80,top:320,opacity:headT,transform:`translateY(${(1-he)*30}px)`}}>
        <div style={{fontWeight:700,fontSize:22,letterSpacing:'.25em',textTransform:'uppercase',color:C.red,marginBottom:28}}>OFF-CAMPUS HOUSING NEAR WASHU</div>
        <div style={{fontWeight:900,fontSize:120,lineHeight:.92,letterSpacing:'-.045em',color:C.dark}}>
          5 TABS.<br/><span style={{color:C.red}}>ZERO<br/>ANSWERS.</span>
        </div>
      </div>
      <div style={{position:'absolute',left:80,right:80,top:1000,display:'flex',flexDirection:'column',gap:16}}>
        {tabs.map((tab,i)=>{
          const tt=clamp((lt-0.6-i*0.18)/0.4,0,1);
          const te=ease.outBack(tt);
          const strikeStart=1.8+i*0.2;
          const strikeT=clamp((lt-strikeStart)/0.3,0,1);
          const strikeE=ease.inOutCubic(strikeT);
          return(
            <div key={i} style={{display:'flex',alignItems:'center',gap:16,padding:'20px 28px',borderRadius:16,background:C.white,border:'1.5px solid rgba(0,0,0,.06)',boxShadow:'0 2px 8px rgba(0,0,0,.04)',opacity:tt,transform:`translateX(${(1-te)*50}px)`,position:'relative'}}>
              <div style={{width:40,height:40,borderRadius:10,background:tab.color,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:18,flexShrink:0}}>{tab.fav}</div>
              <div style={{fontWeight:600,fontSize:26,color:strikeT>0?C.gray:C.dark,letterSpacing:'-.01em',transition:'color 0.2s'}}>{tab.label}</div>
              <div style={{marginLeft:'auto',color:'rgba(0,0,0,.3)',fontSize:22}}>x</div>
              {strikeT>0&&(
                <div style={{position:'absolute',left:28,right:28,top:'50%',height:3,borderRadius:2,background:C.red,transformOrigin:'left center',transform:`scaleX(${strikeE})`,opacity:0.85+strikeE*0.15}}/>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

        background:C.white,
        border:`2px solid ${good?'rgba(34,197,94,.25)':'rgba(226,58,47,.2)'}`,
        boxShadow:good?'0 8px 32px rgba(34,197,94,.1)':'0 8px 32px rgba(226,58,47,.08)',
      }}>
        <div style={{position:'relative',width:'100%',height:460,overflow:'hidden'}}>
          <img src={img} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center 35%'}}/>
          <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'8px 20px',background:'linear-gradient(transparent,rgba(0,0,0,.55))',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:20,fontWeight:700,color:'#fff'}}>{walk} walk to campus</div>
            <div style={{fontSize:20,fontWeight:800,color:'#fff'}}>{price}</div>
          </div>
        </div>
        <div style={{padding:'20px 32px'}}>
          <div style={{fontWeight:800,fontSize:24,color:C.dark,letterSpacing:'-.01em'}}>{address}</div>
        </div>
      </div>
      {popT>0&&(
        <div style={{
          position:'absolute',right:-16,top:'30%',width:300,
          marginTop:-80,
          padding:'22px 24px',borderRadius:14,
          background:accent,
          boxShadow:`0 12px 40px ${good?'rgba(34,197,94,.35)':'rgba(226,58,47,.35)'}`,
          transform:`scale(${.85+popE*.15}) translateX(${(1-popE)*30}px)`,
          opacity:popT,zIndex:10,
        }}>
          <div style={{fontSize:22,color:'rgba(255,255,255,.9)',marginBottom:10}}>{stars}</div>
          <div style={{fontSize:22,fontWeight:600,lineHeight:1.35,color:'#fff',fontStyle:'italic'}}>"{quote}"</div>
          <div style={{marginTop:10,fontSize:16,fontWeight:800,color:'rgba(255,255,255,.85)'}}>— {name}</div>
        </div>
      )}
    </div>
  );
}

function SceneReviews({t}){
  if(t<T.reviews.s||t>T.reviews.e+0.4)return null;
  const lt=t-T.reviews.s;
  const headT=clamp(lt/0.5,0,1);
  const he=ease.outCubic(headT);
  const exitF=lt>5.0?clamp((lt-5.0)/0.4,0,1):0;
  return(
    <div style={{position:'absolute',inset:0,opacity:1-exitF}}>
      <div style={{position:'absolute',left:80,right:80,top:260,opacity:headT,transform:`translateY(${(1-he)*30}px)`}}>
        <div style={{fontWeight:700,fontSize:22,letterSpacing:'.25em',textTransform:'uppercase',color:C.red,marginBottom:28}}>REAL STUDENTS. REAL REVIEWS.</div>
        <div style={{fontWeight:900,fontSize:100,lineHeight:.92,letterSpacing:'-.04em',color:C.dark}}>
          Read the<br/><span style={{color:C.red}}>receipts.</span>
        </div>
      </div>
      <div style={{position:'absolute',left:64,right:64,top:700,display:'flex',flexDirection:'column',gap:28}}>
        <ReviewCard
          lt={lt} delay={0.6} good={false}
          address="7012 Forsyth Blvd"
          name="Rachel"
          quote="The landlord made me fear for my safety."
          rating={1}
          img="property1.jpg"
          walk="12 min"
          price="$950/mo"
        />
        <ReviewCard
          lt={lt} delay={1.6} good={true}
          address="5959 McPherson"
          name="Benjamin"
          quote="Responsive landlord who is quick to help."
          rating={5}
          img="property2.webp"
          walk="6 min"
          price="$780/mo"
        />
      </div>
    </div>
  );
}

/* ── Scene 4: CTA ─────────────────────────────── */
function SceneCTA({t}){
  if(t<T.cta.s)return null;
  const lt=t-T.cta.s;
  const logoT=clamp(lt/0.6,0,1);
  const le=ease.outCubic(logoT);
  const tagT=clamp((lt-0.5)/0.6,0,1);
  const te=ease.outCubic(tagT);
  const btnT=clamp((lt-1.2)/0.5,0,1);
  const be=ease.outBack(btnT);
  const urlT=clamp((lt-1.8)/0.5,0,1);
  const freeT=clamp((lt-2.2)/0.4,0,1);
  const clickTime=3.5;
  const clicked=lt>=clickTime;
  const clickPress=clicked?clamp((lt-clickTime)/0.08,0,1):0;
  const clickRelease=clicked?clamp((lt-clickTime-0.08)/0.15,0,1):0;
  const btnScale=clicked?(1-0.06*clickPress+0.06*clickRelease):1;
  const btnShadow=clicked&&clickRelease<1?'0 4px 16px rgba(226,58,47,.2)':'0 16px 48px rgba(226,58,47,.35)';
  const btnBg=clicked?`rgba(190,30,24,${1-clickRelease*0.15+clickRelease*0.15})`:C.red;
  return(
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
      <div style={{opacity:logoT,transform:`translateY(${(1-le)*30}px)`,display:'flex',flexDirection:'column',alignItems:'center',gap:24}}>
        <Logo size={160} color={C.red}/>
        <div style={{fontWeight:900,fontSize:80,letterSpacing:'-.04em',color:C.dark}}>Proximity</div>
      </div>
      <div style={{marginTop:60,textAlign:'center',opacity:tagT,transform:`translateY(${(1-te)*24}px)`}}>
        <div style={{fontWeight:800,fontSize:52,lineHeight:1.15,letterSpacing:'-.03em',color:C.dark}}>
          Find your place.<br/><span style={{color:C.red}}>Skip the chaos.</span>
        </div>
      </div>
      <div style={{marginTop:64,opacity:btnT,transform:`scale(${(.85+be*.15)*btnScale})`}}>
        <div style={{padding:'32px 64px',background:btnBg,color:'#fff',fontWeight:800,fontSize:36,letterSpacing:'-.01em',borderRadius:999,boxShadow:btnShadow,display:'flex',alignItems:'center',gap:20}}>
          Browse listings or get matched
        </div>
      </div>
      <div style={{marginTop:36,opacity:urlT,transform:`translateY(${(1-ease.outCubic(urlT))*16}px)`}}>
        <div style={{fontSize:30,fontWeight:600,letterSpacing:'.03em',color:C.dark}}>useproximity.org</div>
      </div>
      <div style={{marginTop:24,opacity:freeT}}>
        <div style={{fontSize:18,fontWeight:700,letterSpacing:'.3em',textTransform:'uppercase',color:C.gray}}>FREE FOR WASHU STUDENTS</div>
      </div>
    </div>
  );
}

/* ── Main App ─────────────────────────────────── */
function App(){
  const[started,setStarted]=React.useState(false);
  const[t,setT]=React.useState(0);
  const[done,setDone]=React.useState(false);
  const[zoom,setZoom]=React.useState(1);
  const sfxRef=React.useRef(null);
  const firedRef=React.useRef(new Set());

  React.useEffect(()=>{
    const m=()=>setZoom(Math.min(window.innerWidth/1080,window.innerHeight/1920));
    m();window.addEventListener('resize',m);return()=>window.removeEventListener('resize',m);
  },[]);

  /* SFX triggers */
  React.useEffect(()=>{
    if(!started||done)return;
    const sfx=sfxRef.current;if(!sfx)return;
    const fired=firedRef.current;
    const fire=(k,time,fn)=>{if(t>=time&&!fired.has(k)){fired.add(k);fn();}};

    /* Intro scene - sounds from the very start */
    fire('introImpact',0.0,()=>sfx.impact());
    fire('introName',0.4,()=>sfx.ding(700));
    fire('introBadge',0.7,()=>sfx.tick(1200));

    /* 5 Tabs scene */
    fire('tabsImpact',T.tabs.s,()=>sfx.thump());
    fire('tab1',T.tabs.s+0.7,()=>sfx.tick(900));
    fire('tab2',T.tabs.s+0.88,()=>sfx.tick(1000));
    fire('tab3',T.tabs.s+1.06,()=>sfx.tick(1100));
    fire('tab4',T.tabs.s+1.24,()=>sfx.tick(1200));
    fire('tab5',T.tabs.s+1.42,()=>sfx.tick(1300));

    /* Strikethrough SFX */
    fire('strike0',T.tabs.s+1.8,()=>sfx.swipe());
    fire('strike1',T.tabs.s+2.0,()=>sfx.swipe());
    fire('strike2',T.tabs.s+2.2,()=>sfx.swipe());
    fire('strike3',T.tabs.s+2.4,()=>sfx.swipe());
    fire('strike4',T.tabs.s+2.6,()=>sfx.swipe());

    /* Reviews scene */
    fire('reviewsImpact',T.reviews.s,()=>sfx.impact());
    fire('reviewBadDing',T.reviews.s+0.7,()=>sfx.ding(400));
    fire('reviewBadPop',T.reviews.s+1.6,()=>sfx.pop());
    fire('reviewGoodDing',T.reviews.s+1.6,()=>sfx.ding(900));
    fire('reviewGoodPop',T.reviews.s+2.6,()=>sfx.pop());

    /* CTA scene */
    fire('ctaThump',T.cta.s,()=>sfx.thump());
    fire('ctaDing',T.cta.s+1.8,()=>sfx.ding(880));
    fire('ctaClick',T.cta.s+3.5,()=>sfx.pop());
    fire('ctaConfirm',T.cta.s+3.8,()=>sfx.ding(1100));
  },[t,started,done]);

  /* Master time loop */
  React.useEffect(()=>{
    if(!started)return;
    let raf;const startNow=performance.now();
    const tick=now=>{
      const elapsed=(now-startNow)/1000;
      setT(elapsed);
      if(elapsed>=TOTAL){setDone(true);return;}
      raf=requestAnimationFrame(tick);
    };
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[started]);

  const begin=async()=>{
    if(!sfxRef.current){sfxRef.current=new SfxEngine();}
    sfxRef.current.ensureCtx();
    try{await sfxRef.current.ctx.resume();}catch{}
    firedRef.current=new Set();
    setStarted(true);setDone(false);setT(0);
  };
  const restart=()=>{setStarted(false);setDone(false);setT(0);setTimeout(begin,60);};

  const showChrome=started&&!done&&t>0.3&&t<T.cta.s-0.3;

  return(
    <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:C.offWhite}}>
      <div style={{width:1080,height:1920,background:C.offWhite,position:'relative',overflow:'hidden',zoom}}>
        <Chrome visible={showChrome}/>
        {started&&!done&&(
          <>
            <SceneIntro t={t}/>
            <SceneTabs t={t}/>
            <SceneReviews t={t}/>
            <SceneCTA t={t}/>
          </>
        )}

        {/* Tap-to-play splash */}
        {!started&&(
          <div onClick={begin} style={{position:'absolute',inset:0,zIndex:500,background:C.offWhite,display:'grid',placeItems:'center',cursor:'pointer'}}>
            <div style={{textAlign:'center'}}>
              <div style={{margin:'0 auto 36px'}}><Logo size={180} color={C.red}/></div>
              <div style={{fontWeight:900,fontSize:80,letterSpacing:'-.04em',color:C.dark}}>Proximity</div>
              <div style={{marginTop:14,fontWeight:700,fontSize:20,letterSpacing:'.3em',textTransform:'uppercase',color:C.gray}}>:16 spot - sound on</div>
              <div style={{marginTop:56,width:120,height:120,borderRadius:'50%',background:C.red,display:'inline-flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
                <div style={{width:0,height:0,borderLeft:'32px solid #fff',borderTop:'20px solid transparent',borderBottom:'20px solid transparent',marginLeft:10}}/>
                <span style={{position:'absolute',inset:0,borderRadius:'50%',background:C.red,animation:'pulse 1.8s ease-out infinite',zIndex:-1}}/>
              </div>
              <div style={{marginTop:24,fontWeight:500,fontSize:24,color:C.gray}}>tap to play with sound</div>
            </div>
          </div>
        )}
        {/* Replay */}
        {done&&(
          <div onClick={restart} style={{position:'absolute',inset:0,zIndex:500,background:DARK?'rgba(11,11,12,.88)':'rgba(250,250,250,.85)',display:'grid',placeItems:'center',cursor:'pointer'}}>
            <div style={{textAlign:'center'}}>
              <Logo size={120} color={C.red}/>
              <div style={{marginTop:24,fontWeight:900,fontSize:48,color:C.dark}}>Proximity</div>
              <div style={{marginTop:40,padding:'20px 48px',background:C.red,color:'#fff',borderRadius:999,fontWeight:700,fontSize:22,letterSpacing:'.15em',textTransform:'uppercase',display:'inline-block'}}>&#8635; tap to replay</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
