<script type="text/babel">

const Easing = {
  linear: (t) => t,
  easeInQuad: (t) => t * t,
  easeOutQuad: (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),
  easeInCubic: (t) => t * t * t,
  easeOutCubic: (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),
  easeInQuart: (t) => t * t * t * t,
  easeOutQuart: (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),
  easeInExpo: (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => { if (t === 0) return 0; if (t === 1) return 1; if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10); return 1 - 0.5 * Math.pow(2, -20 * t + 10); },
  easeInSine: (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine: (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,
  easeOutBack: (t) => { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); },
  easeInBack: (t) => { const c1 = 1.70158, c3 = c1 + 1; return c3 * t * t * t - c1 * t * t; },
  easeInOutBack: (t) => { const c1 = 1.70158, c2 = c1 * 1.525; return t < 0.5 ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2 : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2; },
  easeOutElastic: (t) => { const c4 = (2 * Math.PI) / 3; if (t === 0) return 0; if (t === 1) return 1; return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1; },
};

const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => { if (t <= start) return from; if (t >= end) return to; const local = (t - start) / (end - start); return from + (to - from) * ease(local); };
}

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });
const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);
const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;
  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration) ? clamp(localTime / duration, 0, 1) : 0;
  const value = { localTime, progress, duration, visible };
  return (<SpriteContext.Provider value={value}>{typeof children === 'function' ? children(value) : children}</SpriteContext.Provider>);
}

function Stage({ width = 1080, height = 1920, duration = 10, background = '#0B0B0C', loop = true, children }) {
  const [time, setTime] = React.useState(0);
  const [playing, setPlaying] = React.useState(true);
  const [zoomLevel, setZoomLevel] = React.useState(1);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  React.useEffect(() => {
    const measure = () => {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const scaleX = vw / width;
      const scaleY = vh / height;
      setZoomLevel(Math.min(scaleX, scaleY));
    };
    measure();
    window.addEventListener('resize', measure);
    return () => window.removeEventListener('resize', measure);
  }, [width, height]);

  React.useEffect(() => {
    if (!playing) { lastTsRef.current = null; return; }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => { let next = t + dt; if (next >= duration) { if (loop) next = next % duration; else { next = duration; setPlaying(false); } } return next; });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); lastTsRef.current = null; };
  }, [playing, duration, loop]);

  const ctxValue = React.useMemo(() => ({ time, duration, playing, setTime, setPlaying }), [time, duration, playing]);

  return (
    <div style={{ position: 'fixed', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background }}>
      <div style={{ width, height, background, position: 'relative', overflow: 'hidden', zoom: zoomLevel }}>
        <TimelineContext.Provider value={ctxValue}>{children}</TimelineContext.Provider>
      </div>
    </div>
  );
}

        <div style={{ position: 'absolute', top: 14, left: 14, padding: '6px 12px', background: PROX2.red, color: PROX2.paper, borderRadius: 999, fontFamily: FONT_MONO2, fontSize: 14, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase' }}>{rating}</div>
      </div>
      <div style={{ flex: 1, padding: '20px 24px', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
        <div style={{ fontFamily: FONT_DISP2, fontWeight: 800, fontSize: 38, letterSpacing: '-0.025em', color: PROX2.ink, lineHeight: 1 }}>{price}</div>
        <div style={{ marginTop: 10, fontFamily: FONT_DISP2, fontSize: 22, fontWeight: 600, color: PROX2.ink, letterSpacing: '-0.01em' }}>{addr}</div>
        <div style={{ marginTop: 6, fontFamily: FONT_MONO2, fontSize: 16, letterSpacing: '0.1em', textTransform: 'uppercase', color: PROX2.mute, fontWeight: 600 }}>{beds}</div>
      </div>
    </div>
  );
}

function FounderScene3() {
  const { localTime, duration } = useSprite();
  const headT = clamp(localTime / 0.5, 0, 1);
  const headEased = Easing.easeOutCubic(headT);
  const exitFade = localTime > duration - 0.4 ? clamp((localTime - (duration - 0.4)) / 0.4, 0, 1) : 0;
  return (
    <div style={{ position: 'absolute', inset: 0, opacity: 1 - exitFade }}>
      <div style={{ position: 'absolute', left: 80, right: 80, top: 220, textAlign: 'center', opacity: headT, transform: `translateY(${(1 - headEased) * 24}px)` }}>
        <div style={{ fontFamily: FONT_MONO2, fontSize: 22, letterSpacing: '0.32em', textTransform: 'uppercase', color: PROX2.red, fontWeight: 700, marginBottom: 24 }}>79+ verified listings —</div>
        <div style={{ fontFamily: FONT_DISP2, fontSize: 92, fontWeight: 800, lineHeight: 0.95, letterSpacing: '-0.04em', color: PROX2.paper }}>Real places.<br/><span style={{ color: PROX2.red }}>Real reviews.</span></div>
      </div>
      <div style={{ position: 'absolute', left: 0, right: 0, top: 740, display: 'flex', justifyContent: 'center' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 440px)', gridTemplateRows: 'repeat(2, 520px)', gap: 28 }}>
          <PropertyCard delay={0.3} localTime={localTime} image="assets/listing-1.avif" price="$1,750/mo" addr="6040 Pershing Ave" beds="2 bd · walk to campus" rating="★ 4.9"/>
          <PropertyCard delay={0.5} localTime={localTime} image="assets/exterior-1.avif" price="$2,200/mo" addr="5079 Westminster Pl" beds="3 bd · loop shuttle" rating="★ 4.8"/>
          <PropertyCard delay={0.7} localTime={localTime} image="assets/exterior-2.avif" price="$1,400/mo" addr="712 Demun Ave" beds="1 bd · pet-friendly" rating="★ 4.7"/>
          <PropertyCard delay={0.9} localTime={localTime} image="assets/interior-1.avif" price="$1,950/mo" addr="6112 Kingsbury Pl" beds="studio · furnished" rating="★ 5.0"/>
        </div>
      </div>
    </div>
  );
}

function FounderScene4() {
  const { localTime } = useSprite();
  const wmT = clamp(localTime / 0.5, 0, 1);
  const headT = clamp((localTime - 0.4) / 0.5, 0, 1);
  const ctaT = clamp((localTime - 0.9) / 0.5, 0, 1);
  const ctaEased = Easing.easeOutBack(ctaT);
  const urlT = clamp((localTime - 1.3) / 0.4, 0, 1);
  const pulse = 1 + Math.sin(localTime * 4) * 0.015 * clamp((localTime - 1.4) * 2, 0, 1);
  return (
    <div style={{ position: 'absolute', inset: 0 }}>
      <div style={{ position: 'absolute', top: 240, left: 0, right: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 24, opacity: wmT, transform: `translateY(${(1 - Easing.easeOutCubic(wmT)) * 30}px)` }}>
        <ProxLogo2 size={170} bg={PROX2.black}/>
        <div style={{ fontFamily: FONT_DISP2, fontWeight: 800, fontSize: 84, letterSpacing: '-0.035em', color: PROX2.paper, lineHeight: 1 }}>Proximity</div>
      </div>
      <div style={{ position: 'absolute', top: 760, left: 80, right: 80, textAlign: 'center', opacity: headT, transform: `translateY(${(1 - Easing.easeOutCubic(headT)) * 24}px)` }}>
        <div style={{ fontFamily: FONT_DISP2, fontSize: 100, fontWeight: 800, lineHeight: 0.95, letterSpacing: '-0.04em', color: PROX2.paper }}>Find your<br/><span style={{ color: PROX2.red }}>place.</span></div>
        <div style={{ marginTop: 28, fontFamily: FONT_DISP2, fontSize: 36, fontWeight: 500, letterSpacing: '-0.01em', color: 'rgba(247,243,238,0.7)' }}>Stop scrolling. Start living.</div>
      </div>
      <div style={{ position: 'absolute', top: 1300, left: 0, right: 0, display: 'flex', justifyContent: 'center', opacity: ctaT, transform: `scale(${0.85 + ctaEased * 0.15 * pulse})` }}>
        <div style={{ padding: '36px 70px', background: PROX2.red, color: PROX2.paper, fontFamily: FONT_DISP2, fontWeight: 800, fontSize: 52, letterSpacing: '-0.02em', borderRadius: 999, boxShadow: '0 20px 60px rgba(229,50,43,0.45), 0 0 0 6px rgba(229,50,43,0.12)', display: 'inline-flex', alignItems: 'center', gap: 22 }}>
          Start your search
          <div style={{ width: 52, height: 52, borderRadius: '50%', background: PROX2.paper, color: PROX2.red, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 30, fontWeight: 900 }}>→</div>
        </div>
      </div>
      <div style={{ position: 'absolute', bottom: 200, left: 0, right: 0, textAlign: 'center', opacity: urlT, transform: `translateY(${(1 - Easing.easeOutCubic(urlT)) * 18}px)` }}>
        <div style={{ fontFamily: FONT_MONO2, fontSize: 38, fontWeight: 600, letterSpacing: '0.04em', color: PROX2.paper }}>useproximity.org</div>
        <div style={{ marginTop: 14, fontFamily: FONT_MONO2, fontSize: 18, fontWeight: 700, letterSpacing: '0.32em', textTransform: 'uppercase', color: 'rgba(247,243,238,0.5)' }}>link in bio</div>
      </div>
    </div>
  );
}

const FOUNDER_TOTAL = 14;
function FounderReel() {
  return (
    <>
      <BG2/>
      <Sprite start={0}    end={3.5}>          <FounderScene1/> </Sprite>
      <Sprite start={3.5}  end={7.0}>          <FounderScene2/> </Sprite>
      <Sprite start={7.0}  end={10.5}>         <FounderScene3/> </Sprite>
      <Sprite start={10.5} end={FOUNDER_TOTAL}><FounderScene4/> </Sprite>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <Stage width={1080} height={1920} duration={FOUNDER_TOTAL} background="#0B0B0C">
    <FounderReel/>
  </Stage>
);
</script>
</body>
</html>
