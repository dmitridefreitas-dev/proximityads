<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Proximity — Skip the Scroll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #E23A2F;
      --red-tint: #FBE6E4;
      --paper: #FAFAFA;
      --text: #0A0A0A;
      --text-2: #555555;
      --line: rgba(10,10,10,.10);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      font-family: "Inter", system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
    }
    body {
      display: grid;
      place-items: center;
    }
    /* The 9:16 stage. Scales to viewport via JS-free CSS. */
    #root {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }
    .stage {
      position: relative;
      aspect-ratio: 9 / 16;
      height: min(100vh, calc(100vw * 16 / 9));
      width: auto;
      max-height: 100vh;
      background: #000;
      overflow: hidden;
      container-type: size;
      box-shadow: 0 0 80px rgba(0,0,0,.4);
      isolation: isolate;
    }
    /* Container query units make every size scale with the 9:16 canvas. */
    .stage * { font-feature-settings: "ss01", "ss02"; }
    /* Restart pill */
    .restart {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 9999;
      background: rgba(255,255,255,.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
      padding: 8px 14px;
      border-radius: 999px;
      font: 700 11px/1 "Inter", sans-serif;
      letter-spacing: .04em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .restart:hover { background: rgba(255,255,255,.16); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="sfx.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="stages.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
